<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amicale ATTT — Mon espace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003DA6" />
  <style>
    :root { --cp:#003DA6; --cpd:#002a7a; }

    /* ── APP SHELL ── */
    body { min-height:100vh; display:flex; flex-direction:column; background:#f0f2f8; }
    .app-shell { display:flex; flex:1; overflow:hidden; }

    /* ── TOP NAV ── */
    .top-nav { background:var(--cp); padding:.55rem 1.25rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:1040; box-shadow:0 2px 12px rgba(0,0,0,.18); }
    .top-nav .brand { color:#fff; font-weight:800; font-size:1.05rem; text-decoration:none; display:flex; align-items:center; gap:.5rem; flex:1; }
    .top-nav .top-actions { display:flex; align-items:center; gap:.5rem; }
    .btn-nav-sm { border:1px solid rgba(255,255,255,.3); color:#fff!important; border-radius:8px; padding:.35rem .75rem; font-size:.82rem; font-weight:600; background:transparent; text-decoration:none; transition:background .15s; display:inline-flex; align-items:center; gap:.3rem; }
    .btn-nav-sm:hover { background:rgba(255,255,255,.15); }
    .btn-nav-logout { background:#dc3545; border-color:#dc3545; }
    .btn-nav-logout:hover { background:#c82333; }

    /* ── SIDEBAR ── */
    .sidebar {
      width:245px; min-width:245px; background:var(--cp);
      display:flex; flex-direction:column; overflow-y:auto;
      padding:.75rem .5rem 1rem; gap:.2rem;
    }
    .sb-sec { font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em;
              color:rgba(255,255,255,.4); padding:.75rem .75rem .2rem; margin-top:.25rem; }
    .sb-link {
      display:flex; align-items:center; gap:.6rem; color:rgba(255,255,255,.78);
      text-decoration:none; padding:.45rem .75rem; border-radius:9px; font-size:.86rem; font-weight:500;
      transition:background .15s,color .15s; cursor:pointer; background:none; border:none; width:100%; text-align:left;
    }
    .sb-link:hover,.sb-link.active { background:rgba(255,255,255,.15); color:#fff; }
    .sb-link .sb-badge { margin-left:auto; background:rgba(220,53,69,.9); color:#fff; border-radius:999px; font-size:.66rem; font-weight:700; padding:.15rem .45rem; min-width:18px; text-align:center; }
    .sb-divider { border-color:rgba(255,255,255,.15); margin:.5rem .75rem; }

    /* ── MAIN AREA ── */
    .main-area { flex:1; display:flex; flex-direction:column; overflow-y:auto; min-width:0; }

    /* ── WELCOME BAR ── */
    .welcome-bar { background:linear-gradient(135deg,var(--cp),#0056cc); color:white; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.75rem; }
    .welcome-bar h1 { font-size:1.1rem; font-weight:800; margin:0; }
    .welcome-bar p  { margin:0; opacity:.75; font-size:.85rem; }

    /* ── TABS BAR ── */
    .tabs-bar { background:#fff; border-bottom:2px solid #e9ecef; padding:0 1rem; overflow-x:auto; display:flex; gap:.2rem; flex-wrap:nowrap; white-space:nowrap; flex-shrink:0; box-shadow:0 1px 4px rgba(0,0,0,.05); }
    .tab-btn { display:inline-flex; align-items:center; gap:.4rem; padding:.75rem .95rem; border:none; background:none; color:#6c757d; font-weight:600; font-size:.88rem; border-bottom:3px solid transparent; cursor:pointer; transition:color .15s,border-color .15s; white-space:nowrap; }
    .tab-btn:hover { color:var(--cp); }
    .tab-btn.active { color:var(--cp); border-bottom-color:var(--cp); }
    .tab-badge { background:#dc3545; color:#fff; border-radius:999px; font-size:.65rem; font-weight:700; padding:.15rem .45rem; min-width:18px; text-align:center; line-height:1.2; }

    /* ── CONTENT AREA ── */
    .tab-content-area { padding:1.5rem; flex:1; }

    /* ── ACTIVITY CARDS ── */
    .act-item { border-left:4px solid var(--cp); border-radius:0 12px 12px 0; background:#fff; padding:1rem 1.1rem; margin-bottom:.75rem; box-shadow:0 1px 8px rgba(0,61,166,.06); transition:box-shadow .15s; }
    .act-item:hover { box-shadow:0 4px 16px rgba(0,61,166,.12); }
    .date-box { min-width:52px; text-align:center; background:var(--cp); color:white; border-radius:9px; padding:.4rem .5rem; flex-shrink:0; }
    .date-box .day { font-size:1.3rem; font-weight:800; line-height:1; }
    .date-box .mon { font-size:.68rem; text-transform:uppercase; letter-spacing:.05em; opacity:.85; }

    /* ── VOTE CARDS ── */
    .vote-card { border:none; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.07); padding:1.25rem; margin-bottom:.75rem; background:#fff; }
    .vote-card .vote-header { display:flex; justify-content:space-between; align-items:flex-start; gap:.75rem; flex-wrap:wrap; margin-bottom:.75rem; }
    .vote-status-badge { font-size:.72rem; padding:.25rem .7rem; border-radius:999px; font-weight:700; }
    .vote-status-open   { background:#d4edda; color:#155724; }
    .vote-status-closed { background:#f8d7da; color:#721c24; }
    .vote-status-coming { background:#fff3cd; color:#856404; }
    .vote-choice { display:flex; align-items:center; gap:.5rem; padding:.5rem .75rem; border:1.5px solid #dee2e6; border-radius:9px; margin-bottom:.4rem; cursor:pointer; transition:border-color .15s,background .15s; }
    .vote-choice:hover { border-color:var(--cp); background:#f0f5ff; }
    .vote-choice.selected { border-color:var(--cp); background:#e8efff; }
    .vote-choice input[type=checkbox],.vote-choice input[type=radio] { flex-shrink:0; width:17px; height:17px; cursor:pointer; }
    .vote-progress { height:8px; border-radius:99px; background:#e9ecef; margin-top:.3rem; overflow:hidden; }
    .vote-progress-bar { height:100%; background:var(--cp); border-radius:99px; transition:width .5s; }

    /* RESPONSIVE */
    @media(max-width:767px) {
      .sidebar { display:none; }
      .app-shell { flex-direction:column; }
    }
  </style>
</head>
<body>

  <!-- ══ TOP NAVIGATION ════════════════════════════════════════════ -->
  <div class="top-nav">
    <button class="btn-nav-sm d-md-none" onclick="document.getElementById('mobileSidebar').classList.toggle('d-none')" style="border:none;font-size:1.2rem;padding:.3rem .5rem;">
      <i class="bi bi-list"></i>
    </button>
    <a href="index.html" class="brand">
      <img src="img/logo_attt.jpeg" alt="Logo" style="height:30px;border-radius:6px;" onerror="this.style.display='none'">Amicale ATTT
    </a>
    <div class="top-actions">
      <a href="messagerie.html" class="btn-nav-sm position-relative">
        <i class="bi bi-chat-text"></i>
        <span class="d-none d-sm-inline">Messages</span>
        <span id="msg-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;display:none!important;"></span>
      </a>
      <a href="profil.html" class="btn-nav-sm">
        <i class="bi bi-person-circle"></i>
        <span class="d-none d-sm-inline">Mon profil</span>
      </a>
      <a href="#" class="btn-nav-sm btn-nav-logout" onclick="AUTH.logout();return false;">
        <i class="bi bi-box-arrow-right"></i>
        <span class="d-none d-sm-inline">Déconnexion</span>
      </a>
    </div>
  </div>

  <!-- ══ SIDEBAR MOBILE ════════════════════════════════════════════ -->
  <div id="mobileSidebar" class="d-none d-md-none" style="background:var(--cp);padding:.75rem .5rem;z-index:999;">
    <div id="sidebar-mobile-content"></div>
  </div>

  <!-- ══ APP SHELL ═════════════════════════════════════════════════ -->
  <div class="app-shell">

    <!-- SIDEBAR DESKTOP -->
    <aside class="sidebar d-none d-md-flex flex-column" id="sidebar-desktop">
      <!-- Contenu injecté par JS -->
    </aside>

    <!-- MAIN -->
    <div class="main-area">

      <!-- WELCOME BAR -->
      <div class="welcome-bar">
        <div>
          <h1 id="welcome-title">Mon espace</h1>
          <p id="welcome-sub"></p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="badge bg-light text-dark fw-semibold" id="user-role-badge" style="font-size:.78rem;"></span>
        </div>
      </div>

      <!-- TABS BAR -->
      <div class="tabs-bar" role="tablist" id="tabs-bar">
        <!-- Tabs générés dynamiquement -->
      </div>

      <!-- TAB CONTENT -->
      <div class="tab-content-area" id="tab-content">
        <div class="text-center text-muted py-5"><i class="bi bi-hourglass-split me-2"></i>Chargement…</div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
  <script src="js/offers.js"></script>
  <script src="js/conventions.js"></script>
  <script src="js/rentals.js"></script>
  <script src="js/voyages.js"></script>
  <script src="js/votes.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/messaging.js"></script>
  <script src="js/version-check.js"></script>
  <script src="js/update-manager.js"></script>
  <script>
'use strict';

const user = AUTH.requireAuth('famille');
if (!user) throw new Error('Non authentifié');

/* ═══════════════════════════════════════════════════════
   SIDEBAR BUILDER
═══════════════════════════════════════════════════════ */
function buildSidebar() {
  const canAdmin  = AUTH.hasPermission && AUTH.hasPermission('Accéder page Superviseur', user);
  const canDeleg  = AUTH.hasPermission && (AUTH.hasPermission('Accéder page Admin', user) || canAdmin);
  const canDroits = AUTH.hasPermission && AUTH.hasPermission('Accéder page Droits', user);

  const MOIS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const now = new Date().toISOString().slice(0,10);

  let pendingCount = 0;
  try {
    if (typeof MESSAGING !== 'undefined' && MESSAGING.getUnread) {
      pendingCount = MESSAGING.getUnread(user.id).length;
    }
  } catch(e){}

  const sections = [];

  // ── Mes activités
  sections.push(`
    <div class="sb-sec">Mes activités</div>
    <button class="sb-link active" onclick="showTab('events',this)">
      <i class="bi bi-calendar-event"></i>Événements
      <span class="sb-badge d-none" id="sb-cnt-events"></span>
    </button>
    <button class="sb-link" onclick="showTab('offres',this)">
      <i class="bi bi-tag"></i>Offres
      <span class="sb-badge d-none" id="sb-cnt-offres"></span>
    </button>
    <button class="sb-link" onclick="showTab('special',this)">
      <i class="bi bi-stars"></i>Événements spéciaux
      <span class="sb-badge d-none" id="sb-cnt-special"></span>
    </button>
    <button class="sb-link" onclick="showTab('voyages',this)">
      <i class="bi bi-compass"></i>Voyages
      <span class="sb-badge d-none" id="sb-cnt-voyages"></span>
    </button>
    <button class="sb-link" onclick="showTab('conventions',this)">
      <i class="bi bi-award"></i>Conventions
      <span class="sb-badge d-none" id="sb-cnt-conventions"></span>
    </button>
    <button class="sb-link" onclick="showTab('locations',this)">
      <i class="bi bi-house-heart"></i>Locations vacances
      <span class="sb-badge d-none" id="sb-cnt-locations"></span>
    </button>
    <button class="sb-link" onclick="showTab('votes',this)">
      <i class="bi bi-ballot"></i>Votes
      <span class="sb-badge d-none" id="sb-cnt-votes"></span>
    </button>
  `);

  // ── Mon compte
  sections.push(`
    <hr class="sb-divider" />
    <div class="sb-sec">Mon compte</div>
    <a class="sb-link" href="profil.html"><i class="bi bi-person-circle"></i>Mon profil</a>
    <a class="sb-link" href="messagerie.html">
      <i class="bi bi-chat-text"></i>Messages
      ${pendingCount > 0 ? `<span class="sb-badge">${pendingCount}</span>` : ''}
    </a>
    <a class="sb-link" href="location.html"><i class="bi bi-house"></i>Mes locations</a>
  `);

  // ── Administration
  if (canDeleg || canAdmin || canDroits) {
    sections.push(`<hr class="sb-divider" /><div class="sb-sec">Administration</div>`);
    if (canDeleg) sections.push(`<a class="sb-link" href="admin.html"><i class="bi bi-people"></i>Espace délégué</a>`);
    if (canAdmin) sections.push(`<a class="sb-link" href="superviseur.html"><i class="bi bi-shield-check"></i>Espace direction</a>`);
    if (canDroits) sections.push(`<a class="sb-link" href="droits.html"><i class="bi bi-shield-lock"></i>Rôles &amp; droits</a>`);
    sections.push(`
      <a class="sb-link" href="activites.html"><i class="bi bi-calendar-plus"></i>Programmer activité</a>
      <a class="sb-link" href="parametres.html"><i class="bi bi-geo-alt"></i>Coordonnées site</a>
      <a class="sb-link" href="publicites.html"><i class="bi bi-badge-ad"></i>Publicités</a>
      <a class="sb-link" href="versions.html"><i class="bi bi-cloud-upload"></i>Versions &amp; deploy</a>
      <a class="sb-link" href="journal.html"><i class="bi bi-journal-text"></i>Journal des opérations</a>
    `);
  }

  // ── Site public
  sections.push(`
    <hr class="sb-divider" />
    <div class="sb-sec">Site public</div>
    <a class="sb-link" href="index.html" target="_blank"><i class="bi bi-globe2"></i>Voir le site public</a>
    <a class="sb-link" href="contact.html" target="_blank"><i class="bi bi-envelope"></i>Page contact</a>
    <a class="sb-link" href="hebergement.html"><i class="bi bi-server"></i>Guide technique</a>
  `);

  const html = sections.join('');
  const d = document.getElementById('sidebar-desktop');
  const m = document.getElementById('sidebar-mobile-content');
  if (d) d.innerHTML = html;
  if (m) m.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   TABS BAR BUILDER
═══════════════════════════════════════════════════════ */
const TABS = [
  { id:'events',      icon:'bi-calendar-event', label:'Événements' },
  { id:'offres',      icon:'bi-tag',            label:'Offres' },
  { id:'special',     icon:'bi-stars',           label:'Spéciaux' },
  { id:'voyages',     icon:'bi-compass',         label:'Voyages' },
  { id:'conventions', icon:'bi-award',           label:'Conventions' },
  { id:'locations',   icon:'bi-house-heart',     label:'Locations' },
  { id:'votes',       icon:'bi-ballot',          label:'Votes' },
];

function buildTabsBar() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = TABS.map((t,i) => `
    <button class="tab-btn ${i===0?'active':''}" id="tab-btn-${t.id}" onclick="showTab('${t.id}',null)">
      <i class="bi ${t.icon}"></i>${t.label}
      <span class="tab-badge d-none" id="tbadge-${t.id}">0</span>
    </button>`).join('');
}

/* ═══════════════════════════════════════════════════════
   TAB RENDERER
═══════════════════════════════════════════════════════ */
let _currentTab = 'events';

function showTab(tabId, sbEl) {
  _currentTab = tabId;
  // Update tab bar active
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('tab-btn-' + tabId);
  if (tb) tb.classList.add('active');
  // Update sidebar active
  document.querySelectorAll('.sb-link').forEach(b => b.classList.remove('active'));
  if (sbEl) sbEl.classList.add('active');
  // Render content
  const area = document.getElementById('tab-content');
  area.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-hourglass-split me-2"></i>Chargement…</div>';
  setTimeout(() => renderTab(tabId, area), 100);
}

const MOIS_SHORT = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d); return dt.getDate() + ' ' + MOIS_SHORT[dt.getMonth()] + ' ' + dt.getFullYear();
}

function renderTab(tabId, area) {
  const now = new Date().toISOString().slice(0,10);

  try {
    switch(tabId) {

      /* ── ÉVÉNEMENTS ── */
      case 'events': {
        let items = [];
        if (typeof EVENTS !== 'undefined' && EVENTS.getEvents) items = EVENTS.getEvents();
        const upcoming = items.filter(e => e.dateDebut >= now);
        if (!upcoming.length) { area.innerHTML = emptyState('calendar-event','Aucun événement à venir'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Événements à venir <span class="badge bg-primary">${upcoming.length}</span></h2>` +
          upcoming.map(ev => actCard(ev, 'events')).join('');
        break;
      }

      /* ── OFFRES ── */
      case 'offres': {
        let items = [];
        if (typeof OFFERS !== 'undefined' && OFFERS.getOffers) items = OFFERS.getOffers();
        if (!items.length) { area.innerHTML = emptyState('tag','Aucune offre disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Offres disponibles <span class="badge bg-warning text-dark">${items.length}</span></h2>` +
          items.map(o => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#f59e0b;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(o.titre)}</div>
                <div class="small text-muted">${AUTH.esc(o.description||'')} · Expire : ${AUTH.esc(o.dateExpiration||'—')}</div>
              </div>
              <a href="offres.html" class="btn btn-sm btn-warning fw-bold" style="color:#000;">Voir</a>
            </div>`).join('');
        break;
      }

      /* ── SPÉCIAUX ── */
      case 'special': {
        let items = [];
        if (typeof EVENTS !== 'undefined' && EVENTS.getEvents) items = EVENTS.getEvents().filter(e => e.special);
        if (!items.length) { area.innerHTML = emptyState('stars','Aucun événement spécial'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Événements spéciaux <span class="badge bg-danger">${items.length}</span></h2>` +
          items.map(ev => actCard(ev, 'special')).join('');
        break;
      }

      /* ── VOYAGES ── */
      case 'voyages': {
        let items = [];
        if (typeof VOYAGES !== 'undefined' && VOYAGES.getVoyages) items = VOYAGES.getVoyages().filter(v => v.actif !== false);
        if (!items.length) { area.innerHTML = emptyState('compass','Aucun voyage disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Voyages disponibles <span class="badge bg-success">${items.length}</span></h2>` +
          items.map(v => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#2e7d32;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(v.titre)}</div>
                <div class="small text-muted">${AUTH.esc(v.description||'')} · ${fmtDate(v.dateDebut)} → ${fmtDate(v.dateFin)}</div>
                <div class="small text-muted">Prix : ${v.prix||'—'} TND · Places : ${v.placesDisponibles||'—'}</div>
              </div>
              <a href="voyages.html" class="btn btn-sm btn-attt">Voir</a>
            </div>`).join('');
        break;
      }

      /* ── CONVENTIONS ── */
      case 'conventions': {
        let items = [];
        if (typeof CONVENTIONS !== 'undefined' && CONVENTIONS.getConventions) items = CONVENTIONS.getConventions();
        if (!items.length) { area.innerHTML = emptyState('award','Aucune convention disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Conventions partenaires <span class="badge" style="background:var(--cp);">${items.length}</span></h2>` +
          items.map(c => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#7b1fa2;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(c.titre)}</div>
                <div class="small text-muted">${AUTH.esc(c.description||'')} · Expire : ${AUTH.esc(c.dateExpiration||'—')}</div>
              </div>
              <a href="conventions.html" class="btn btn-sm" style="background:#7b1fa2;color:#fff;font-size:.8rem;">Voir</a>
            </div>`).join('');
        break;
      }

      /* ── LOCATIONS ── */
      case 'locations': {
        let items = [];
        if (typeof RENTALS !== 'undefined' && RENTALS.getRentals) items = RENTALS.getRentals().filter(r => r.actif);
        if (!items.length) { area.innerHTML = emptyState('house-heart','Aucune location disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Locations vacances <span class="badge bg-danger">${items.length}</span></h2>` +
          items.map(r => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#d84315;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(r.titre)}</div>
                <div class="small text-muted">${AUTH.esc(r.adresse||'')} ${AUTH.esc(r.description||'')}</div>
              </div>
              <a href="location.html" class="btn btn-sm" style="background:#d84315;color:#fff;font-size:.8rem;">Réserver</a>
            </div>`).join('');
        break;
      }

      /* ── VOTES ── */
      case 'votes': {
        renderVotesTab(area);
        break;
      }

      default:
        area.innerHTML = emptyState('question-circle','Section non disponible');
    }
  } catch(e) {
    area.innerHTML = `<div class="alert alert-warning">Erreur de chargement : ${e.message}</div>`;
  }
}

/* ── Render votes ── */
function renderVotesTab(area) {
  let votes = [];
  try { if (typeof VOTES !== 'undefined' && VOTES.getVotes) votes = VOTES.getVotes(); } catch(e){}

  const now = new Date();
  const open   = votes.filter(v => { const s=new Date(v.dateDebut), e=new Date(v.dateFin); return s<=now && e>=now; });
  const coming = votes.filter(v => new Date(v.dateDebut) > now);
  const closed = votes.filter(v => new Date(v.dateFin) < now);

  let html = `<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h2 class="h5 fw-bold mb-0">Votes &amp; Élections</h2>`;

  if (AUTH.hasPermission && AUTH.hasPermission('Voir bouton Créer vote', user)) {
    html += `<button class="btn btn-attt btn-sm" onclick="openNewVote()">
      <i class="bi bi-plus-circle me-1"></i>Créer un vote
    </button>`;
  }
  html += '</div>';

  if (!votes.length) {
    html += emptyState('ballot','Aucun vote en cours');
    area.innerHTML = html;
    return;
  }

  if (open.length) {
    html += `<h3 class="h6 fw-bold text-success mb-2"><i class="bi bi-circle-fill me-1" style="font-size:.5rem;"></i>Votes en cours (${open.length})</h3>`;
    html += open.map(v => buildVoteCard(v, 'open')).join('');
  }
  if (coming.length) {
    html += `<h3 class="h6 fw-bold text-warning mb-2 mt-3"><i class="bi bi-clock me-1"></i>À venir (${coming.length})</h3>`;
    html += coming.map(v => buildVoteCard(v, 'coming')).join('');
  }
  if (closed.length) {
    html += `<h3 class="h6 fw-bold text-muted mb-2 mt-3"><i class="bi bi-check-circle me-1"></i>Terminés (${closed.length})</h3>`;
    html += closed.map(v => buildVoteCard(v, 'closed')).join('');
  }

  area.innerHTML = html;
}

function buildVoteCard(v, status) {
  const alreadyVoted = false; // TODO: check user vote via VOTES.getUserVote(user.id, v.id)
  const statusBadge = {
    open:   `<span class="vote-status-badge vote-status-open"><i class="bi bi-play-circle me-1"></i>En cours</span>`,
    coming: `<span class="vote-status-badge vote-status-coming"><i class="bi bi-clock me-1"></i>À venir</span>`,
    closed: `<span class="vote-status-badge vote-status-closed"><i class="bi bi-stop-circle me-1"></i>Terminé</span>`,
  }[status];

  const totalVotes = (v.resultats || []).reduce((s,c) => s + (c.nbVotes||0), 0) || 0;

  let choicesHtml = '';
  if (v.choix && v.choix.length) {
    const inputType = (v.maxChoix||1) > 1 ? 'checkbox' : 'radio';
    const name = 'vote_' + v.id;
    choicesHtml = v.choix.map((c, idx) => {
      const nbVotes = (v.resultats && v.resultats[idx]) ? (v.resultats[idx].nbVotes||0) : 0;
      const pct = totalVotes > 0 ? Math.round(nbVotes/totalVotes*100) : 0;
      if (status === 'closed' || alreadyVoted) {
        return `<div class="mb-2">
          <div class="d-flex justify-content-between small mb-1">
            <span>${AUTH.esc(c.label||c)}</span>
            <span class="fw-bold">${nbVotes} vote(s) — ${pct}%</span>
          </div>
          <div class="vote-progress"><div class="vote-progress-bar" style="width:${pct}%;"></div></div>
        </div>`;
      }
      return `<label class="vote-choice w-100" onclick="this.classList.toggle('selected')">
        <input type="${inputType}" name="${name}" value="${idx}" class="vote-input-${v.id}" />
        <span>${AUTH.esc(c.label||c)}</span>
      </label>`;
    }).join('');
  }

  const canVote = status === 'open' && !alreadyVoted
    && (!v.rolesAutorises || !v.rolesAutorises.length || v.rolesAutorises.includes(user.role));

  return `<div class="vote-card">
    <div class="vote-header">
      <div>
        <div class="fw-bold fs-6">${AUTH.esc(v.titre)}</div>
        ${v.description ? `<div class="small text-muted mt-1">${AUTH.esc(v.description)}</div>` : ''}
        <div class="small text-muted mt-1">
          <i class="bi bi-calendar me-1"></i>${fmtDate(v.dateDebut)} → ${fmtDate(v.dateFin)}
          · ${v.minChoix||1} choix min / ${v.maxChoix||1} max
          ${v.rolesAutorises && v.rolesAutorises.length ? `· <i class="bi bi-people me-1"></i>${v.rolesAutorises.join(', ')}` : ''}
        </div>
      </div>
      ${statusBadge}
    </div>
    ${choicesHtml}
    ${canVote ? `<button class="btn btn-attt btn-sm mt-2" onclick="submitVote('${v.id}')">
      <i class="bi bi-check-circle me-1"></i>Voter
    </button>` : ''}
    ${alreadyVoted ? `<div class="alert alert-success py-1 px-2 mt-2 small mb-0"><i class="bi bi-check-circle me-1"></i>Vous avez déjà voté.</div>` : ''}
    ${status !== 'closed' ? `<div class="small text-muted mt-2">${totalVotes} vote(s) enregistré(s)</div>` : ''}
  </div>`;
}

function submitVote(voteId) {
  const inputs = document.querySelectorAll(`.vote-input-${voteId}:checked`);
  if (!inputs.length) { alert('Veuillez sélectionner au moins un choix.'); return; }
  const choix = Array.from(inputs).map(i => parseInt(i.value));
  try {
    const result = VOTES.vote(user.id, voteId, choix);
    if (result.ok) { alert('✓ Vote enregistré !'); renderTab('votes', document.getElementById('tab-content')); }
    else alert(result.msg || 'Erreur lors du vote.');
  } catch(e) { alert('Erreur : ' + e.message); }
}

function openNewVote() {
  const titre = prompt('Titre du vote :');
  if (!titre) return;
  window.location.href = 'activites.html?tab=votes&new=1&titre=' + encodeURIComponent(titre);
}

/* ── Helpers ── */
function actCard(ev, type) {
  const d = ev.dateDebut ? new Date(ev.dateDebut) : null;
  const dayStr = d ? d.getDate() : '—';
  const monStr = d ? MOIS_SHORT[d.getMonth()] : '—';
  const canJoin = !ev.complet && (!ev.placesDisponibles || ev.placesDisponibles > 0);
  return `<div class="act-item d-flex gap-3 align-items-start">
    ${d ? `<div class="date-box"><div class="day">${dayStr}</div><div class="mon">${monStr}</div></div>` : ''}
    <div class="flex-grow-1 min-w-0">
      <div class="fw-bold">${AUTH.esc(ev.titre)}</div>
      <div class="small text-muted">${AUTH.esc(ev.lieu||'')} ${ev.dateDebut ? '· ' + fmtDate(ev.dateDebut) : ''}</div>
      ${ev.description ? `<div class="small text-secondary mt-1">${AUTH.esc(ev.description.substring(0,120))}…</div>` : ''}
    </div>
    <div class="text-end flex-shrink-0">
      ${ev.placesDisponibles !== undefined ? `<div class="small text-muted mb-1">${ev.placesDisponibles} place(s)</div>` : ''}
      ${canJoin
        ? `<button class="btn btn-attt btn-sm" onclick="joinActivity('${type}','${ev.id}')">
             <i class="bi bi-person-plus me-1"></i>S'inscrire
           </button>`
        : `<span class="badge bg-secondary">Complet</span>`}
    </div>
  </div>`;
}

function joinActivity(type, id) {
  // Redirige vers la page correspondante
  const pages = { events:'evenements.html', special:'evenements.html', voyages:'voyages.html' };
  window.location.href = (pages[type]||'activites.html') + '?id=' + encodeURIComponent(id);
}

function emptyState(icon, msg) {
  return `<div class="text-center py-5 text-muted">
    <i class="bi bi-${icon} fs-1 d-block mb-2 opacity-25"></i>${msg}
  </div>`;
}

DB_READY.then(() => {
  // Welcome bar
  document.getElementById('welcome-title').textContent = 'Bonjour, ' + (user.prenom || user.login) + ' !';
  document.getElementById('welcome-sub').textContent   = user.email ? user.email : '';
  const roleBadge = document.getElementById('user-role-badge');
  const ROLE_LABELS = { famille:'Membre', membre:'Membre', delegue:'Délégué', direction:'Direction', admin:'Administrateur' };
  if (roleBadge) roleBadge.textContent = ROLE_LABELS[user.role] || user.role;

  // Build sidebar & tabs
  buildSidebar();
  buildTabsBar();

  // Update badges
  function setBadge(id, count) {
    if (!count) return;
    const els = [document.getElementById('sb-cnt-'+id), document.getElementById('tbadge-'+id)];
    els.forEach(el => { if(el) { el.textContent = count; el.classList.remove('d-none'); } });
  }

  try {
    const now = new Date().toISOString().slice(0,10);
    if (typeof EVENTS !== 'undefined' && EVENTS.getEvents) {
      const evts = EVENTS.getEvents().filter(e => e.dateDebut >= now);
      setBadge('events', evts.length);
      const spec = evts.filter(e => e.special);
      setBadge('special', spec.length);
    }
    if (typeof OFFERS !== 'undefined' && OFFERS.getOffers) setBadge('offres', OFFERS.getOffers().length);
    if (typeof VOYAGES !== 'undefined' && VOYAGES.getVoyages) setBadge('voyages', VOYAGES.getVoyages().filter(v=>v.actif!==false).length);
    if (typeof CONVENTIONS !== 'undefined' && CONVENTIONS.getConventions) setBadge('conventions', CONVENTIONS.getConventions().length);
    if (typeof RENTALS !== 'undefined' && RENTALS.getRentals) setBadge('locations', RENTALS.getRentals().filter(r=>r.actif).length);
    if (typeof VOTES !== 'undefined' && VOTES.getVotes) {
      const n = new Date();
      const openV = VOTES.getVotes().filter(v => new Date(v.dateDebut)<=n && new Date(v.dateFin)>=n);
      setBadge('votes', openV.length);
    }
  } catch(e){}

  // Messages badge
  try {
    if (typeof MESSAGING !== 'undefined' && MESSAGING.getUnread) {
      const unread = MESSAGING.getUnread(user.id).length;
      if (unread > 0) {
        const b = document.getElementById('msg-badge');
        if (b) { b.textContent = unread; b.style.display = ''; }
      }
    }
  } catch(e){}

  // Show first tab
  renderTab('events', document.getElementById('tab-content'));

  // Apply permissions
  AUTH.applyPermissions && AUTH.applyPermissions(document.body, user);
});
