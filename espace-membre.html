<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amicale ATTT — Mon espace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003DA6" />
  <style>
    :root { --cp:#003DA6; --cpd:#002a7a; }

    /* ── APP SHELL ── */
    body { min-height:100vh; display:flex; flex-direction:column; background:#f0f2f8; }
    .app-shell { display:flex; flex:1; overflow:hidden; }

    /* ── TOP NAV ── */
    .top-nav { background:var(--cp); padding:.55rem 1.25rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:1040; box-shadow:0 2px 12px rgba(0,0,0,.18); }
    .top-nav .brand { color:#fff; font-weight:800; font-size:1.05rem; text-decoration:none; display:flex; align-items:center; gap:.5rem; flex:1; }
    .top-nav .top-actions { display:flex; align-items:center; gap:.5rem; }
    .btn-nav-sm { border:1px solid rgba(255,255,255,.3); color:#fff!important; border-radius:8px; padding:.35rem .75rem; font-size:.82rem; font-weight:600; background:transparent; text-decoration:none; transition:background .15s; display:inline-flex; align-items:center; gap:.3rem; }
    .btn-nav-sm:hover { background:rgba(255,255,255,.15); }
    .btn-nav-logout { background:#dc3545; border-color:#dc3545; }
    .btn-nav-logout:hover { background:#c82333; }

    /* ── SIDEBAR ── */
    .sidebar {
      width:245px; min-width:245px; background:var(--cp);
      display:flex; flex-direction:column; overflow-y:auto;
      padding:.75rem .5rem 1rem; gap:.2rem;
    }
    .sb-sec { font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em;
              color:rgba(255,255,255,.4); padding:.75rem .75rem .2rem; margin-top:.25rem; }
    .sb-link {
      display:flex; align-items:center; gap:.6rem; color:rgba(255,255,255,.78);
      text-decoration:none; padding:.45rem .75rem; border-radius:9px; font-size:.86rem; font-weight:500;
      transition:background .15s,color .15s; cursor:pointer; background:none; border:none; width:100%; text-align:left;
    }
    .sb-link:hover,.sb-link.active { background:rgba(255,255,255,.15); color:#fff; }
    .sb-link .sb-badge { margin-left:auto; background:rgba(220,53,69,.9); color:#fff; border-radius:999px; font-size:.66rem; font-weight:700; padding:.15rem .45rem; min-width:18px; text-align:center; }
    .sb-divider { border-color:rgba(255,255,255,.15); margin:.5rem .75rem; }

    /* ── MAIN AREA ── */
    .main-area { flex:1; display:flex; flex-direction:column; overflow-y:auto; min-width:0; }

    /* ── WELCOME BAR ── */
    .welcome-bar { background:linear-gradient(135deg,var(--cp),#0056cc); color:white; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.75rem; }
    .welcome-bar h1 { font-size:1.1rem; font-weight:800; margin:0; }
    .welcome-bar p  { margin:0; opacity:.75; font-size:.85rem; }



    /* ── CONTENT AREA ── */
    .tab-content-area { padding:1.5rem; flex:1; }

    /* ── ACTIVITY CARDS ── */
    .act-item { border-left:4px solid var(--cp); border-radius:0 12px 12px 0; background:#fff; padding:1rem 1.1rem; margin-bottom:.75rem; box-shadow:0 1px 8px rgba(0,61,166,.06); transition:box-shadow .15s; }
    .act-item:hover { box-shadow:0 4px 16px rgba(0,61,166,.12); }
    .date-box { min-width:52px; text-align:center; background:var(--cp); color:white; border-radius:9px; padding:.4rem .5rem; flex-shrink:0; }
    .date-box .day { font-size:1.3rem; font-weight:800; line-height:1; }
    .date-box .mon { font-size:.68rem; text-transform:uppercase; letter-spacing:.05em; opacity:.85; }

    /* ── VOTE CARDS ── */
    .vote-card { border:none; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.07); padding:1.25rem; margin-bottom:.75rem; background:#fff; }
    .vote-card .vote-header { display:flex; justify-content:space-between; align-items:flex-start; gap:.75rem; flex-wrap:wrap; margin-bottom:.75rem; }
    .vote-status-badge { font-size:.72rem; padding:.25rem .7rem; border-radius:999px; font-weight:700; }
    .vote-status-open   { background:#d4edda; color:#155724; }
    .vote-status-closed { background:#f8d7da; color:#721c24; }
    .vote-status-coming { background:#fff3cd; color:#856404; }
    .vote-choice { display:flex; align-items:center; gap:.5rem; padding:.5rem .75rem; border:1.5px solid #dee2e6; border-radius:9px; margin-bottom:.4rem; cursor:pointer; transition:border-color .15s,background .15s; }
    .vote-choice:hover { border-color:var(--cp); background:#f0f5ff; }
    .vote-choice.selected { border-color:var(--cp); background:#e8efff; }
    .vote-choice input[type=checkbox],.vote-choice input[type=radio] { flex-shrink:0; width:17px; height:17px; cursor:pointer; }
    .vote-progress { height:8px; border-radius:99px; background:#e9ecef; margin-top:.3rem; overflow:hidden; }
    .vote-progress-bar { height:100%; background:var(--cp); border-radius:99px; transition:width .5s; }

    /* RESPONSIVE */
    @media(max-width:767px) {
      .sidebar { display:none; }
      .app-shell { flex-direction:column; }
    }
  </style>
</head>
<body>

  <!-- ══ TOP NAVIGATION ════════════════════════════════════════════ -->
  <div class="top-nav">
    <button class="btn-nav-sm d-md-none" onclick="document.getElementById('mobileSidebar').classList.toggle('d-none')" style="border:none;font-size:1.2rem;padding:.3rem .5rem;">
      <i class="bi bi-list"></i>
    </button>
    <a href="index.html" class="brand">
      <img src="img/logo_attt.jpeg" alt="Logo" style="height:30px;border-radius:6px;" onerror="this.style.display='none'">Amicale ATTT
    </a>
    <div class="top-actions">
      <a href="messagerie.html" class="btn-nav-sm position-relative">
        <i class="bi bi-chat-text"></i>
        <span class="d-none d-sm-inline">Messages</span>
        <span id="msg-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem;display:none!important;"></span>
      </a>
      <a href="profil.html" class="btn-nav-sm">
        <i class="bi bi-person-circle"></i>
        <span class="d-none d-sm-inline">Mon profil</span>
      </a>
      <a href="#" class="btn-nav-sm btn-nav-logout" onclick="AUTH.logout();return false;">
        <i class="bi bi-box-arrow-right"></i>
        <span class="d-none d-sm-inline">Déconnexion</span>
      </a>
    </div>
  </div>

  <!-- ══ SIDEBAR MOBILE ════════════════════════════════════════════ -->
  <div id="mobileSidebar" class="d-none d-md-none" style="background:var(--cp);padding:.75rem .5rem;z-index:999;">
    <div id="sidebar-mobile-content"></div>
  </div>

  <!-- ══ APP SHELL ═════════════════════════════════════════════════ -->
  <div class="app-shell">

    <!-- SIDEBAR DESKTOP -->
    <aside class="sidebar d-none d-md-flex flex-column" id="sidebar-desktop">
      <!-- Contenu injecté par JS -->
    </aside>

    <!-- MAIN -->
    <div class="main-area">

      <!-- WELCOME BAR -->
      <div class="welcome-bar">
        <div>
          <h1 id="welcome-title">Mon espace</h1>
          <p id="welcome-sub"></p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="badge bg-light text-dark fw-semibold" id="user-role-badge" style="font-size:.78rem;"></span>
        </div>
      </div>

      <!-- TAB CONTENT -->
      <div class="tab-content-area" id="tab-content">
        <div class="text-center text-muted py-5"><i class="bi bi-hourglass-split me-2"></i>Chargement…</div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/conventions.js"></script>
  <script src="js/rentals.js"></script>
  <script src="js/voyages.js"></script>
  <script src="js/votes.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/version-check.js"></script>
  <script src="js/update-manager.js"></script>
  <script>
'use strict';

const user = AUTH.requireAuth('famille');
if (!user) throw new Error('Non authentifié');
if (!AUTH.hasPermission('Accéder page Espace membre', user, null, 'action')) {
  alert('Accès refusé à la page Espace membre.');
  history.back();
  throw new Error('Permission refusée');
}

/* ═══════════════════════════════════════════════════════
   SIDEBAR BUILDER
═══════════════════════════════════════════════════════ */
function buildSidebar() {
  const canAdmin  = AUTH.hasPermission && AUTH.hasPermission('Accéder page Superviseur', user);
  const canDeleg  = AUTH.hasPermission && (AUTH.hasPermission('Accéder page Admin', user) || canAdmin);
  const canDroits = AUTH.hasPermission && AUTH.hasPermission('Accéder page Droits', user);
  const isMaster  = AUTH.getHighestPrivilegeLevel && AUTH.getHighestPrivilegeLevel(user) <= 0;

  const MOIS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const now = new Date().toISOString().slice(0,10);

  let pendingCount = 0;
  try {
    if (typeof MESSAGING !== 'undefined' && MESSAGING.getUnread) {
      pendingCount = MESSAGING.getUnread(user.id).length;
    }
  } catch(e){}

  const sections = [];

  // ═══ SECTION 1 : ACTIVITÉS ═══
  sections.push(`
    <div class="sb-sec"><i class="bi bi-grid me-1"></i>Activités</div>
    <button class="sb-link active" onclick="showTab('accueil',this)">
      <i class="bi bi-house-door"></i>Accueil
    </button>
    <button class="sb-link" onclick="showTab('events',this)">
      <i class="bi bi-calendar-event"></i>Événements
      <span class="sb-badge d-none" id="sb-cnt-events"></span>
    </button>
    <button class="sb-link" onclick="showTab('special',this)">
      <i class="bi bi-stars"></i>Spéciaux
      <span class="sb-badge d-none" id="sb-cnt-special"></span>
    </button>
    <button class="sb-link" onclick="showTab('voyages',this)">
      <i class="bi bi-compass"></i>Voyages
      <span class="sb-badge d-none" id="sb-cnt-voyages"></span>
    </button>
    <button class="sb-link" onclick="showTab('offres',this)">
      <i class="bi bi-tag"></i>Offres
      <span class="sb-badge d-none" id="sb-cnt-offres"></span>
    </button>
    <button class="sb-link" onclick="showTab('conventions',this)">
      <i class="bi bi-award"></i>Conventions
      <span class="sb-badge d-none" id="sb-cnt-conventions"></span>
    </button>
    <button class="sb-link" onclick="showTab('locations',this)">
      <i class="bi bi-house-heart"></i>Locations vacances
      <span class="sb-badge d-none" id="sb-cnt-locations"></span>
    </button>
    <button class="sb-link" onclick="showTab('votes',this)">
      <i class="bi bi-ballot"></i>Votes
      <span class="sb-badge d-none" id="sb-cnt-votes"></span>
    </button>
  `);

  // Actes personnalisés — intégrés dans Activités
  const customEntities = _getEntityTypes().filter(t => {
    const perm = 'Accéder ' + t.name;
    return !AUTH.hasPermission || AUTH.hasPermission(perm, user);
  });
  if (customEntities.length) {
    let customHtml = '';
    customEntities.forEach(t => {
      const tabId = 'entity_' + t.id;
      customHtml += `<button class="sb-link" onclick="showTab('${tabId}',this)">
        <i class="bi ${AUTH.esc(t.icon || 'bi-file-earmark')}"></i>${AUTH.esc(t.name)}
        <span class="sb-badge d-none" id="sb-cnt-${tabId}"></span>
      </button>`;
    });
    sections.push(customHtml);
  }

  // ═══ SECTION 2 : MON PROFIL ═══
  sections.push(`
    <hr class="sb-divider" />
    <div class="sb-sec"><i class="bi bi-person me-1"></i>Mon profil</div>
    <a class="sb-link" href="profil.html"><i class="bi bi-person-circle"></i>Profil</a>
    <a class="sb-link" href="messagerie.html">
      <i class="bi bi-chat-text"></i>Messages
      ${pendingCount > 0 ? `<span class="sb-badge">${pendingCount}</span>` : ''}
    </a>
  `);

  // ═══ SECTION 3 : ADMINISTRATION (selon droits) ═══
  const canUpdate = !AUTH.hasPermission || AUTH.hasPermission('Tester mise à jour', user) || AUTH.hasPermission('Publier mise à jour', user);
  if (canDeleg || canAdmin || canDroits || canUpdate) {
    let adminHtml = `<hr class="sb-divider" /><div class="sb-sec"><i class="bi bi-gear me-1"></i>Administration</div>`;
    adminHtml += `<a class="sb-link" href="creation-actes.html"><i class="bi bi-database-fill-gear"></i>Création d'actes</a>`;
    if (canDroits) adminHtml += `<a class="sb-link" href="droits.html"><i class="bi bi-shield-lock"></i>Droits</a>`;
    if (canDeleg) adminHtml += `<a class="sb-link" href="admin.html"><i class="bi bi-people"></i>Gestion utilisateurs</a>`;
    if (canAdmin) adminHtml += `<a class="sb-link" href="superviseur.html"><i class="bi bi-shield-check"></i>Espace direction</a>`;
    adminHtml += `<a class="sb-link" href="publicites.html"><i class="bi bi-badge-ad"></i>Publicités accueil</a>`;
    adminHtml += `<a class="sb-link" href="parametres.html"><i class="bi bi-sliders"></i>Paramètres site</a>`;
    if (canUpdate) adminHtml += `<button class="sb-link" onclick="showTab('mises-a-jour',this)"><i class="bi bi-cloud-arrow-up"></i>Mises à jour</button>`;
    adminHtml += `<a class="sb-link" href="journal.html"><i class="bi bi-journal-text"></i>Journal</a>`;
    sections.push(adminHtml);
  }

  // ═══ SECTION 4 : MAÎTRE (level 0 uniquement) ═══
  if (isMaster) {
    sections.push(`
      <hr class="sb-divider" />
      <div class="sb-sec"><i class="bi bi-star me-1"></i>Maître</div>
      <button class="sb-link" onclick="showTab('master-panel',this)">
        <i class="bi bi-cpu"></i>Panneau maître
      </button>
      <a class="sb-link" href="versions.html"><i class="bi bi-cloud-upload"></i>Versions & deploy</a>
      <a class="sb-link" href="master.html"><i class="bi bi-terminal"></i>Console master</a>
    `);
  }

  const html = sections.join('');
  const d = document.getElementById('sidebar-desktop');
  const m = document.getElementById('sidebar-mobile-content');
  if (d) d.innerHTML = html;
  if (m) m.innerHTML = html;
}

/* ── Actes personnalisés (créés via Création d'actes) ── */
function _getEntityTypes() {
  try { return JSON.parse(localStorage.getItem('attt_entity_types') || '[]'); } catch { return []; }
}
function _getEntityRecords() {
  try { return JSON.parse(localStorage.getItem('attt_entity_records') || '[]'); } catch { return []; }
}
function _saveEntityRecords(records) {
  localStorage.setItem('attt_entity_records', JSON.stringify(records));
  if (typeof DB !== 'undefined' && DB.save) DB.save('attt_entity_records', records);
}

/* ═══════════════════════════════════════════════════════
   TAB RENDERER
═══════════════════════════════════════════════════════ */
let _currentTab = 'accueil';

function showTab(tabId, sbEl) {
  _currentTab = tabId;
  // Update sidebar active
  document.querySelectorAll('.sb-link').forEach(b => b.classList.remove('active'));
  if (sbEl) {
    sbEl.classList.add('active');
  } else {
    // find sidebar button matching this tab
    document.querySelectorAll('.sb-link').forEach(b => {
      if (b.getAttribute('onclick') && b.getAttribute('onclick').includes("'" + tabId + "'")) b.classList.add('active');
    });
  }
  // Render content
  const area = document.getElementById('tab-content');
  area.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-hourglass-split me-2"></i>Chargement…</div>';
  setTimeout(() => renderTab(tabId, area), 100);
}

const MOIS_SHORT = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d); return dt.getDate() + ' ' + MOIS_SHORT[dt.getMonth()] + ' ' + dt.getFullYear();
}

function renderTab(tabId, area) {
  const now = new Date().toISOString().slice(0,10);

  try {
    switch(tabId) {

      /* ── ACCUEIL (DASHBOARD) ── */
      case 'accueil': {
        renderAccueilTab(area);
        break;
      }

      /* ── PANNEAU MAÎTRE ── */
      case 'master-panel': {
        renderMasterPanel(area);
        break;
      }

      /* ── MISES À JOUR ── */
      case 'mises-a-jour': {
        renderUpdatesPanel(area);
        break;
      }

      /* ── ÉVÉNEMENTS ── */
      case 'events': {
        let items = [];
        if (typeof EVENTS !== 'undefined' && EVENTS.getEvents) items = EVENTS.getEvents();
        const upcoming = items.filter(e => e.dateDebut >= now);
        if (!upcoming.length) { area.innerHTML = emptyState('calendar-event','Aucun événement à venir'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Événements à venir <span class="badge bg-primary">${upcoming.length}</span></h2>` +
          upcoming.map(ev => actCard(ev, 'events')).join('');
        break;
      }

      /* ── OFFRES ── */
      case 'offres': {
        let items = [];
        if (typeof OFFERS !== 'undefined' && OFFERS.getOffers) items = OFFERS.getOffers();
        if (!items.length) { area.innerHTML = emptyState('tag','Aucune offre disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Offres disponibles <span class="badge bg-warning text-dark">${items.length}</span></h2>` +
          items.map(o => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#f59e0b;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(o.titre)}</div>
                <div class="small text-muted">${AUTH.esc(o.description||'')} · Expire : ${AUTH.esc(o.dateExpiration||'—')}</div>
              </div>
              <a href="offres.html" class="btn btn-sm btn-warning fw-bold" style="color:#000;">Voir</a>
            </div>`).join('');
        break;
      }

      /* ── SPÉCIAUX ── */
      case 'special': {
        let items = [];
        if (typeof EVENTS !== 'undefined' && EVENTS.getEvents) items = EVENTS.getEvents().filter(e => e.special);
        if (!items.length) { area.innerHTML = emptyState('stars','Aucun événement spécial'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Événements spéciaux <span class="badge bg-danger">${items.length}</span></h2>` +
          items.map(ev => actCard(ev, 'special')).join('');
        break;
      }

      /* ── VOYAGES ── */
      case 'voyages': {
        let items = [];
        if (typeof VOYAGES !== 'undefined' && VOYAGES.getVoyages) items = VOYAGES.getVoyages().filter(v => v.actif !== false);
        if (!items.length) { area.innerHTML = emptyState('compass','Aucun voyage disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Voyages disponibles <span class="badge bg-success">${items.length}</span></h2>` +
          items.map(v => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#2e7d32;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(v.titre)}</div>
                <div class="small text-muted">${AUTH.esc(v.description||'')} · ${fmtDate(v.dateDebut)} → ${fmtDate(v.dateFin)}</div>
                <div class="small text-muted">Prix : ${v.prix||'—'} TND · Places : ${v.placesDisponibles||'—'}</div>
              </div>
              <a href="voyages.html" class="btn btn-sm btn-attt">Voir</a>
            </div>`).join('');
        break;
      }

      /* ── CONVENTIONS ── */
      case 'conventions': {
        let items = [];
        if (typeof CONVENTIONS !== 'undefined' && CONVENTIONS.getConventions) items = CONVENTIONS.getConventions();
        if (!items.length) { area.innerHTML = emptyState('award','Aucune convention disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Conventions partenaires <span class="badge" style="background:var(--cp);">${items.length}</span></h2>` +
          items.map(c => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#7b1fa2;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(c.titre)}</div>
                <div class="small text-muted">${AUTH.esc(c.description||'')} · Expire : ${AUTH.esc(c.dateExpiration||'—')}</div>
              </div>
              <a href="conventions.html" class="btn btn-sm" style="background:#7b1fa2;color:#fff;font-size:.8rem;">Voir</a>
            </div>`).join('');
        break;
      }

      /* ── LOCATIONS ── */
      case 'locations': {
        let items = [];
        if (typeof RENTALS !== 'undefined' && RENTALS.getRentals) items = RENTALS.getRentals().filter(r => r.actif);
        if (!items.length) { area.innerHTML = emptyState('house-heart','Aucune location disponible'); return; }
        area.innerHTML = `<h2 class="h5 fw-bold mb-3">Locations vacances <span class="badge bg-danger">${items.length}</span></h2>` +
          items.map(r => `
            <div class="act-item d-flex gap-3 align-items-start" style="border-left-color:#d84315;">
              <div class="flex-grow-1">
                <div class="fw-bold">${AUTH.esc(r.titre)}</div>
                <div class="small text-muted">${AUTH.esc(r.adresse||'')} ${AUTH.esc(r.description||'')}</div>
              </div>
              <a href="location.html" class="btn btn-sm" style="background:#d84315;color:#fff;font-size:.8rem;">Réserver</a>
            </div>`).join('');
        break;
      }

      /* ── VOTES ── */
      case 'votes': {
        renderVotesTab(area);
        break;
      }

      default:
        // ── ACTES PERSONNALISÉS ──
        if (tabId.startsWith('entity_')) {
          renderEntityTab(tabId.replace('entity_', ''), area);
        } else {
          area.innerHTML = emptyState('question-circle','Section non disponible');
        }
    }
  } catch(e) {
    area.innerHTML = `<div class="alert alert-warning">Erreur de chargement : ${e.message}</div>`;
  }
}

/* ── Render votes ── */
function renderVotesTab(area) {
  let votes = [];
  try { if (typeof VOTES !== 'undefined' && VOTES.getVotes) votes = VOTES.getVotes(); } catch(e){}

  const now = new Date();
  const open   = votes.filter(v => { const s=new Date(v.dateDebut), e=new Date(v.dateFin); return s<=now && e>=now; });
  const coming = votes.filter(v => new Date(v.dateDebut) > now);
  const closed = votes.filter(v => new Date(v.dateFin) < now);

  let html = `<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h2 class="h5 fw-bold mb-0">Votes &amp; Élections</h2>`;

  if (AUTH.hasPermission && AUTH.hasPermission('Voir bouton Créer vote', user)) {
    html += `<button class="btn btn-attt btn-sm" onclick="openNewVote()">
      <i class="bi bi-plus-circle me-1"></i>Créer un vote
    </button>`;
  }
  html += '</div>';

  if (!votes.length) {
    html += emptyState('ballot','Aucun vote en cours');
    area.innerHTML = html;
    return;
  }

  if (open.length) {
    html += `<h3 class="h6 fw-bold text-success mb-2"><i class="bi bi-circle-fill me-1" style="font-size:.5rem;"></i>Votes en cours (${open.length})</h3>`;
    html += open.map(v => buildVoteCard(v, 'open')).join('');
  }
  if (coming.length) {
    html += `<h3 class="h6 fw-bold text-warning mb-2 mt-3"><i class="bi bi-clock me-1"></i>À venir (${coming.length})</h3>`;
    html += coming.map(v => buildVoteCard(v, 'coming')).join('');
  }
  if (closed.length) {
    html += `<h3 class="h6 fw-bold text-muted mb-2 mt-3"><i class="bi bi-check-circle me-1"></i>Terminés (${closed.length})</h3>`;
    html += closed.map(v => buildVoteCard(v, 'closed')).join('');
  }

  area.innerHTML = html;
}

function buildVoteCard(v, status) {
  const alreadyVoted = false; // TODO: check user vote via VOTES.getUserVote(user.id, v.id)
  const statusBadge = {
    open:   `<span class="vote-status-badge vote-status-open"><i class="bi bi-play-circle me-1"></i>En cours</span>`,
    coming: `<span class="vote-status-badge vote-status-coming"><i class="bi bi-clock me-1"></i>À venir</span>`,
    closed: `<span class="vote-status-badge vote-status-closed"><i class="bi bi-stop-circle me-1"></i>Terminé</span>`,
  }[status];

  const totalVotes = (v.resultats || []).reduce((s,c) => s + (c.nbVotes||0), 0) || 0;

  let choicesHtml = '';
  if (v.choix && v.choix.length) {
    const inputType = (v.maxChoix||1) > 1 ? 'checkbox' : 'radio';
    const name = 'vote_' + v.id;
    choicesHtml = v.choix.map((c, idx) => {
      const nbVotes = (v.resultats && v.resultats[idx]) ? (v.resultats[idx].nbVotes||0) : 0;
      const pct = totalVotes > 0 ? Math.round(nbVotes/totalVotes*100) : 0;
      if (status === 'closed' || alreadyVoted) {
        return `<div class="mb-2">
          <div class="d-flex justify-content-between small mb-1">
            <span>${AUTH.esc(c.label||c)}</span>
            <span class="fw-bold">${nbVotes} vote(s) — ${pct}%</span>
          </div>
          <div class="vote-progress"><div class="vote-progress-bar" style="width:${pct}%;"></div></div>
        </div>`;
      }
      return `<label class="vote-choice w-100" onclick="this.classList.toggle('selected')">
        <input type="${inputType}" name="${name}" value="${idx}" class="vote-input-${v.id}" />
        <span>${AUTH.esc(c.label||c)}</span>
      </label>`;
    }).join('');
  }

  const canVote = status === 'open' && !alreadyVoted
    && (!v.rolesAutorises || !v.rolesAutorises.length || v.rolesAutorises.includes(user.role));

  return `<div class="vote-card">
    <div class="vote-header">
      <div>
        <div class="fw-bold fs-6">${AUTH.esc(v.titre)}</div>
        ${v.description ? `<div class="small text-muted mt-1">${AUTH.esc(v.description)}</div>` : ''}
        <div class="small text-muted mt-1">
          <i class="bi bi-calendar me-1"></i>${fmtDate(v.dateDebut)} → ${fmtDate(v.dateFin)}
          · ${v.minChoix||1} choix min / ${v.maxChoix||1} max
          ${v.rolesAutorises && v.rolesAutorises.length ? `· <i class="bi bi-people me-1"></i>${v.rolesAutorises.join(', ')}` : ''}
        </div>
      </div>
      ${statusBadge}
    </div>
    ${choicesHtml}
    ${canVote ? `<button class="btn btn-attt btn-sm mt-2" onclick="submitVote('${v.id}')">
      <i class="bi bi-check-circle me-1"></i>Voter
    </button>` : ''}
    ${alreadyVoted ? `<div class="alert alert-success py-1 px-2 mt-2 small mb-0"><i class="bi bi-check-circle me-1"></i>Vous avez déjà voté.</div>` : ''}
    ${status !== 'closed' ? `<div class="small text-muted mt-2">${totalVotes} vote(s) enregistré(s)</div>` : ''}
  </div>`;
}

function submitVote(voteId) {
  const inputs = document.querySelectorAll(`.vote-input-${voteId}:checked`);
  if (!inputs.length) { alert('Veuillez sélectionner au moins un choix.'); return; }
  const choix = Array.from(inputs).map(i => parseInt(i.value));
  try {
    const result = VOTES.vote(user.id, voteId, choix);
    if (result.ok) { alert('✓ Vote enregistré !'); renderTab('votes', document.getElementById('tab-content')); }
    else alert(result.msg || 'Erreur lors du vote.');
  } catch(e) { alert('Erreur : ' + e.message); }
}

function openNewVote() {
  const titre = prompt('Titre du vote :');
  if (!titre) return;
  window.location.href = 'activites.html?tab=votes&new=1&titre=' + encodeURIComponent(titre);
}

/* ── Rendu d'un acte personnalisé (avec CRUD selon permissions) ── */
function renderEntityTab(typeId, area) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) { area.innerHTML = emptyState('exclamation-triangle', 'Type d\'acte introuvable'); return; }

  const LAYOUT = new Set(['separator','heading','pagebreak']);
  const allRecords = _getEntityRecords();
  const records = allRecords.filter(r => r._typeId === typeId && r._status !== 'supprime');
  const activeRecords = records.filter(r => r._status === 'actif');
  const blockedRecords = records.filter(r => r._status === 'bloque');
  const visibleFields = type.fields.filter(f => !LAYOUT.has(f.type) && f.type !== 'hidden' && f.type !== 'captcha' && f.type !== 'signature');

  // Permissions
  const canConsult = !AUTH.hasPermission || AUTH.hasPermission('Consulter ' + type.name, user);
  const canCreate  = !AUTH.hasPermission || AUTH.hasPermission('Créer ' + type.name, user);
  const canModify  = !AUTH.hasPermission || AUTH.hasPermission('Modifier ' + type.name, user);
  const canBlock   = !AUTH.hasPermission || AUTH.hasPermission('Bloquer ' + type.name, user);
  const canDelete  = !AUTH.hasPermission || AUTH.hasPermission('Supprimer ' + type.name, user);
  const canEmpty   = !AUTH.hasPermission || AUTH.hasPermission('Vider ' + type.name, user) || AUTH.hasPermission('Vider un acte', user);
  const canDeleteType = !AUTH.hasPermission || AUTH.hasPermission('Supprimer acte ' + type.name, user) || AUTH.hasPermission('Supprimer un acte', user);

  // Vérifier le rôle et les dates
  const roleOk = !type.rolesAutorises?.length || type.rolesAutorises.includes(user.role);
  const now = new Date();
  const isOpen = (!type.dateDebut || new Date(type.dateDebut) <= now) && (!type.dateFin || new Date(type.dateFin) >= now);
  const isFuture = type.dateDebut && new Date(type.dateDebut) > now;
  const isPast = type.dateFin && new Date(type.dateFin) < now;

  // ── En-tête
  let html = `<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h2 class="h5 fw-bold mb-0"><i class="bi ${AUTH.esc(type.icon||'bi-file-earmark')} me-2"></i>${AUTH.esc(type.name)}</h2>
    <div class="d-flex gap-2 align-items-center flex-wrap">
      ${isPast ? '<span class="badge bg-secondary">Terminé</span>' : isFuture ? '<span class="badge bg-warning text-dark">À venir</span>' : isOpen ? '<span class="badge bg-success">En cours</span>' : ''}
      <span class="badge bg-primary">${activeRecords.length} actif(s)</span>
      ${blockedRecords.length ? `<span class="badge bg-warning text-dark">${blockedRecords.length} bloqué(s)</span>` : ''}
      ${canCreate && roleOk && isOpen ? `<button class="btn btn-attt btn-sm" onclick="entityCreateRecord('${AUTH.esc(typeId)}')"><i class="bi bi-plus-circle me-1"></i>Créer</button>` : ''}
      ${canEmpty && records.length ? `<button class="btn btn-outline-warning btn-sm" onclick="entityEmptyType('${AUTH.esc(typeId)}')"><i class="bi bi-trash3 me-1"></i>Vider</button>` : ''}
      ${canDeleteType ? `<button class="btn btn-outline-danger btn-sm" onclick="entityDeleteType('${AUTH.esc(typeId)}')"><i class="bi bi-x-circle me-1"></i>Supprimer acte</button>` : ''}
    </div>
  </div>`;

  if (type.description) html += `<p class="text-muted mb-2">${AUTH.esc(type.description)}</p>`;

  // Infos contraintes
  const infos = [];
  if (type.dateDebut) infos.push('<i class="bi bi-calendar-event me-1"></i>Début : ' + AUTH.esc(type.dateDebut.slice(0,16).replace('T',' ')));
  if (type.dateFin) infos.push('<i class="bi bi-calendar-x me-1"></i>Fin : ' + AUTH.esc(type.dateFin.slice(0,16).replace('T',' ')));
  if (type.maxParticipants) infos.push('<i class="bi bi-people me-1"></i>Max ' + type.maxParticipants + ' participants');
  if (type.maxPerUser && type.maxPerUser > 1) infos.push('<i class="bi bi-person me-1"></i>Max ' + type.maxPerUser + ' fois / utilisateur');
  if (type.rolesAutorises?.length) infos.push('<i class="bi bi-person-badge me-1"></i>' + type.rolesAutorises.join(', '));
  if (infos.length) html += `<div class="d-flex flex-wrap gap-3 mb-3 small text-muted">${infos.join('')}</div>`;

  if (!roleOk) {
    html += `<div class="alert alert-info py-2"><i class="bi bi-info-circle me-1"></i>Cet acte est réservé aux rôles : ${AUTH.esc(type.rolesAutorises.join(', '))}</div>`;
  }

  if (!records.length) {
    html += emptyState('inbox', 'Aucun enregistrement pour « ' + AUTH.esc(type.name) + ' »');
    area.innerHTML = html;
    return;
  }

  // ── Cartes pour chaque enregistrement
  const displayFields = visibleFields.slice(0, 6);
  html += records.map(rec => {
    const title = rec[displayFields[0]?.id] || type.name;
    const details = displayFields.slice(1).map(f => {
      const v = rec[f.id];
      if (v == null || v === '') return '';
      let display = '';
      if (f.type === 'checkbox') display = v ? '✓' : '';
      else if (f.type === 'rating') display = '★'.repeat(+v || 0);
      else if (f.type === 'color') display = `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${AUTH.esc(String(v))};vertical-align:middle;"></span>`;
      else if (f.type === 'checkbox-group' && Array.isArray(v)) display = v.join(', ');
      else if (f.type === 'location' && typeof v === 'object') display = `📍 ${v.lat||'?'}, ${v.lng||'?'}`;
      else display = AUTH.esc(String(v).slice(0, 80));
      return display ? `<span class="text-muted small">${AUTH.esc(f.label)}:</span> ${display}` : '';
    }).filter(Boolean);

    const isBlocked = rec._status === 'bloque';
    const borderColor = isBlocked ? '#ffc107' : 'var(--cp)';

    // Actions CRUD
    let actions = '';
    if (canConsult)                actions += `<button class="btn btn-sm btn-outline-info me-1" title="Aperçu" onclick="entityPreviewRecord('${AUTH.esc(typeId)}','${AUTH.esc(rec._id)}')"><i class="bi bi-eye"></i></button>`;
    if (canModify && !isBlocked) actions += `<button class="btn btn-sm btn-outline-primary me-1" title="Modifier" onclick="entityEditRecord('${AUTH.esc(typeId)}','${AUTH.esc(rec._id)}')"><i class="bi bi-pencil"></i></button>`;
    if (canBlock && !isBlocked)  actions += `<button class="btn btn-sm btn-outline-warning me-1" title="Bloquer" onclick="entityBlockRecord('${AUTH.esc(typeId)}','${AUTH.esc(rec._id)}')"><i class="bi bi-lock"></i></button>`;
    if (canBlock && isBlocked)   actions += `<button class="btn btn-sm btn-outline-success me-1" title="Débloquer" onclick="entityUnblockRecord('${AUTH.esc(typeId)}','${AUTH.esc(rec._id)}')"><i class="bi bi-unlock"></i></button>`;
    if (canDelete)               actions += `<button class="btn btn-sm btn-outline-danger" title="Supprimer" onclick="entityDeleteRecord('${AUTH.esc(typeId)}','${AUTH.esc(rec._id)}')"><i class="bi bi-trash"></i></button>`;

    return `<div class="act-item d-flex gap-3 align-items-start" style="border-left-color:${borderColor};${isBlocked ? 'opacity:.7;' : ''}">
      <div class="flex-grow-1">
        <div class="fw-bold">${AUTH.esc(String(title).slice(0,100))}
          ${isBlocked ? '<span class="badge bg-warning text-dark ms-2" style="font-size:.65rem;">Bloqué</span>' : ''}
        </div>
        ${details.length ? `<div class="small text-muted mt-1">${details.join(' · ')}</div>` : ''}
        <div class="small text-muted mt-1"><i class="bi bi-clock me-1"></i>${AUTH.esc((rec._createdAt||'').slice(0,10))}${rec._createdBy ? ' · par ' + AUTH.esc(rec._createdBy) : ''}</div>
      </div>
      ${actions ? `<div class="d-flex align-items-center flex-shrink-0">${actions}</div>` : ''}
    </div>`;
  }).join('');

  area.innerHTML = html;
}

/* ── CRUD actions for entity records ── */
function entityCreateRecord(typeId) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) return;

  const LAYOUT = new Set(['separator','heading','pagebreak','hidden','captcha','signature']);
  const fields = type.fields.filter(f => !LAYOUT.has(f.type));

  let formHtml = fields.map(f => {
    const req = f.required ? 'required' : '';
    const id = 'ent_' + f.id;
    switch(f.type) {
      case 'text': case 'email': case 'url': case 'tel': case 'password':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="${f.type}" class="form-control" id="${id}" ${req} /></div>`;
      case 'number': case 'range':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="number" class="form-control" id="${id}" ${f.min!=null?'min="'+f.min+'"':''} ${f.max!=null?'max="'+f.max+'"':''} ${req} /></div>`;
      case 'date': case 'time': case 'datetime-local': case 'month': case 'week': case 'color':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="${f.type}" class="form-control" id="${id}" ${req} /></div>`;
      case 'textarea':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><textarea class="form-control" id="${id}" rows="3" ${req}></textarea></div>`;
      case 'select': case 'radio':
        const opts = (f.options||[]).map(o => `<option value="${AUTH.esc(o)}">${AUTH.esc(o)}</option>`).join('');
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><select class="form-select" id="${id}" ${req}><option value="">— Choisir —</option>${opts}</select></div>`;
      case 'checkbox':
        return `<div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="${id}" /><label class="form-check-label fw-semibold">${AUTH.esc(f.label)}</label></div>`;
      case 'checkbox-group':
        const cbs = (f.options||[]).map((o,i) => `<div class="form-check"><input type="checkbox" class="form-check-input ent-cb-${f.id}" value="${AUTH.esc(o)}" id="${id}_${i}" /><label class="form-check-label" for="${id}_${i}">${AUTH.esc(o)}</label></div>`).join('');
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label>${cbs}</div>`;
      case 'file': case 'image':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="file" class="form-control" id="${id}" ${req} /></div>`;
      case 'rating':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><select class="form-select" id="${id}" ${req}><option value="">—</option><option value="1">★</option><option value="2">★★</option><option value="3">★★★</option><option value="4">★★★★</option><option value="5">★★★★★</option></select></div>`;
      default:
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="text" class="form-control" id="${id}" ${req} /></div>`;
    }
  }).join('');

  const area = document.getElementById('tab-content');
  area.innerHTML = `
    <div class="d-flex align-items-center gap-3 mb-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="showTab('entity_${AUTH.esc(typeId)}',null)"><i class="bi bi-arrow-left me-1"></i>Retour</button>
      <h2 class="h5 fw-bold mb-0"><i class="bi ${AUTH.esc(type.icon||'bi-file-earmark')} me-2"></i>Nouveau : ${AUTH.esc(type.name)}</h2>
    </div>
    <div class="card border-0 shadow-sm" style="border-radius:12px;max-width:720px;">
      <div class="card-body p-4">
        <form id="entity-form" onsubmit="entitySaveNewRecord('${AUTH.esc(typeId)}');return false;">
          ${formHtml}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-attt"><i class="bi bi-check-circle me-1"></i>Enregistrer</button>
            <button type="button" class="btn btn-outline-secondary" onclick="showTab('entity_${AUTH.esc(typeId)}',null)">Annuler</button>
          </div>
        </form>
      </div>
    </div>`;
}

function entitySaveNewRecord(typeId) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) return;

  const LAYOUT = new Set(['separator','heading','pagebreak','hidden','captcha','signature']);
  const fields = type.fields.filter(f => !LAYOUT.has(f.type));

  const record = {
    _id: 'rec_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
    _typeId: typeId,
    _status: 'actif',
    _createdAt: new Date().toISOString(),
    _createdBy: user.prenom || user.login || user.id,
    _userId: user.id
  };

  for (const f of fields) {
    const el = document.getElementById('ent_' + f.id);
    if (!el) continue;
    if (f.type === 'checkbox') {
      record[f.id] = el.checked;
    } else if (f.type === 'checkbox-group') {
      record[f.id] = Array.from(document.querySelectorAll('.ent-cb-' + f.id + ':checked')).map(i => i.value);
    } else if (f.type === 'number' || f.type === 'range' || f.type === 'rating') {
      record[f.id] = el.value ? Number(el.value) : null;
    } else {
      record[f.id] = el.value;
    }
    // Validation required
    if (f.required && (record[f.id] === '' || record[f.id] == null)) {
      alert('Le champ « ' + f.label + ' » est obligatoire.');
      el.focus();
      return;
    }
  }

  const allRecords = _getEntityRecords();
  allRecords.push(record);
  _saveEntityRecords(allRecords);
  showTab('entity_' + typeId, null);
}

function entityEditRecord(typeId, recId) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) return;
  const allRecords = _getEntityRecords();
  const rec = allRecords.find(r => r._id === recId);
  if (!rec) return;

  const LAYOUT = new Set(['separator','heading','pagebreak','hidden','captcha','signature']);
  const fields = type.fields.filter(f => !LAYOUT.has(f.type));

  let formHtml = fields.map(f => {
    const req = f.required ? 'required' : '';
    const id = 'ent_' + f.id;
    const val = rec[f.id];
    switch(f.type) {
      case 'text': case 'email': case 'url': case 'tel': case 'password':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="${f.type}" class="form-control" id="${id}" value="${AUTH.esc(String(val||''))}" ${req} /></div>`;
      case 'number': case 'range':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="number" class="form-control" id="${id}" value="${val!=null?val:''}" ${f.min!=null?'min="'+f.min+'"':''} ${f.max!=null?'max="'+f.max+'"':''} ${req} /></div>`;
      case 'date': case 'time': case 'datetime-local': case 'month': case 'week': case 'color':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="${f.type}" class="form-control" id="${id}" value="${AUTH.esc(String(val||''))}" ${req} /></div>`;
      case 'textarea':
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><textarea class="form-control" id="${id}" rows="3" ${req}>${AUTH.esc(String(val||''))}</textarea></div>`;
      case 'select': case 'radio':
        const opts = (f.options||[]).map(o => `<option value="${AUTH.esc(o)}" ${o===val?'selected':''}>${AUTH.esc(o)}</option>`).join('');
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><select class="form-select" id="${id}" ${req}><option value="">— Choisir —</option>${opts}</select></div>`;
      case 'checkbox':
        return `<div class="mb-3 form-check"><input type="checkbox" class="form-check-input" id="${id}" ${val?'checked':''} /><label class="form-check-label fw-semibold">${AUTH.esc(f.label)}</label></div>`;
      case 'checkbox-group':
        const selected = Array.isArray(val) ? val : [];
        const cbs = (f.options||[]).map((o,i) => `<div class="form-check"><input type="checkbox" class="form-check-input ent-cb-${f.id}" value="${AUTH.esc(o)}" id="${id}_${i}" ${selected.includes(o)?'checked':''} /><label class="form-check-label" for="${id}_${i}">${AUTH.esc(o)}</label></div>`).join('');
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label>${cbs}</div>`;
      case 'rating':
        const rOpts = [1,2,3,4,5].map(n => `<option value="${n}" ${+val===n?'selected':''}>${'★'.repeat(n)}</option>`).join('');
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><select class="form-select" id="${id}" ${req}><option value="">—</option>${rOpts}</select></div>`;
      default:
        return `<div class="mb-3"><label class="form-label fw-semibold">${AUTH.esc(f.label)}</label><input type="text" class="form-control" id="${id}" value="${AUTH.esc(String(val||''))}" ${req} /></div>`;
    }
  }).join('');

  const area = document.getElementById('tab-content');
  area.innerHTML = `
    <div class="d-flex align-items-center gap-3 mb-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="showTab('entity_${AUTH.esc(typeId)}',null)"><i class="bi bi-arrow-left me-1"></i>Retour</button>
      <h2 class="h5 fw-bold mb-0"><i class="bi bi-pencil me-2"></i>Modifier : ${AUTH.esc(type.name)}</h2>
    </div>
    <div class="card border-0 shadow-sm" style="border-radius:12px;max-width:720px;">
      <div class="card-body p-4">
        <form id="entity-form" onsubmit="entitySaveEditRecord('${AUTH.esc(typeId)}','${AUTH.esc(recId)}');return false;">
          ${formHtml}

            <button type="submit" class="btn btn-attt"><i class="bi bi-check-circle me-1"></i>Enregistrer</button>
            <button type="button" class="btn btn-outline-secondary" onclick="showTab('entity_${AUTH.esc(typeId)}',null)">Annuler</button>
          </div>
        </form>
      </div>
    </div>`;
}

function entitySaveEditRecord(typeId, recId) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) return;

  const LAYOUT = new Set(['separator','heading','pagebreak','hidden','captcha','signature']);
  const fields = type.fields.filter(f => !LAYOUT.has(f.type));

  const allRecords = _getEntityRecords();
  const rec = allRecords.find(r => r._id === recId);
  if (!rec) return;

  rec._updatedAt = new Date().toISOString();
  rec._updatedBy = user.prenom || user.login || user.id;

  for (const f of fields) {
    const el = document.getElementById('ent_' + f.id);
    if (!el) continue;
    if (f.type === 'checkbox') {
      rec[f.id] = el.checked;
    } else if (f.type === 'checkbox-group') {
      rec[f.id] = Array.from(document.querySelectorAll('.ent-cb-' + f.id + ':checked')).map(i => i.value);
    } else if (f.type === 'number' || f.type === 'range' || f.type === 'rating') {
      rec[f.id] = el.value ? Number(el.value) : null;
    } else {
      rec[f.id] = el.value;
    }
    if (f.required && (rec[f.id] === '' || rec[f.id] == null)) {
      alert('Le champ « ' + f.label + ' » est obligatoire.');
      el.focus();
      return;
    }
  }

  _saveEntityRecords(allRecords);
  showTab('entity_' + typeId, null);
}

function entityBlockRecord(typeId, recId) {
  if (!confirm('Bloquer cet enregistrement ?')) return;
  const allRecords = _getEntityRecords();
  const rec = allRecords.find(r => r._id === recId);
  if (rec) { rec._status = 'bloque'; rec._blockedAt = new Date().toISOString(); rec._blockedBy = user.login || user.id; }
  _saveEntityRecords(allRecords);
  showTab('entity_' + typeId, null);
}

function entityUnblockRecord(typeId, recId) {
  if (!confirm('Débloquer cet enregistrement ?')) return;
  const allRecords = _getEntityRecords();
  const rec = allRecords.find(r => r._id === recId);
  if (rec) { rec._status = 'actif'; delete rec._blockedAt; delete rec._blockedBy; }
  _saveEntityRecords(allRecords);
  showTab('entity_' + typeId, null);
}

function entityDeleteRecord(typeId, recId) {
  if (!confirm('Supprimer définitivement cet enregistrement ?')) return;
  const allRecords = _getEntityRecords();
  const rec = allRecords.find(r => r._id === recId);
  if (rec) { rec._status = 'supprime'; rec._deletedAt = new Date().toISOString(); rec._deletedBy = user.login || user.id; }
  _saveEntityRecords(allRecords);
  showTab('entity_' + typeId, null);
}

/* ── Aperçu complet d'un enregistrement ── */
function entityPreviewRecord(typeId, recId) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) return;
  const allRecords = _getEntityRecords();
  const rec = allRecords.find(r => r._id === recId);
  if (!rec) return;

  const LAYOUT = new Set(['separator','heading','pagebreak','hidden','captcha','signature']);
  const fields = type.fields.filter(f => !LAYOUT.has(f.type));
  const isBlocked = rec._status === 'bloque';

  let rows = fields.map(f => {
    const val = rec[f.id];
    let display = '';
    if (val == null || val === '') display = '<span class="text-muted fst-italic">—</span>';
    else if (f.type === 'checkbox') display = val ? '<i class="bi bi-check-circle-fill text-success"></i> Oui' : '<i class="bi bi-x-circle text-danger"></i> Non';
    else if (f.type === 'rating') display = '<span style="color:#f59e0b;font-size:1.1rem;">' + '★'.repeat(+val || 0) + '☆'.repeat(5 - (+val || 0)) + '</span>';
    else if (f.type === 'color') display = `<span style="display:inline-block;width:22px;height:22px;border-radius:6px;background:${AUTH.esc(String(val))};vertical-align:middle;border:1px solid #ccc;"></span> <code>${AUTH.esc(String(val))}</code>`;
    else if (f.type === 'checkbox-group' && Array.isArray(val)) display = val.map(v => `<span class="badge bg-primary me-1">${AUTH.esc(v)}</span>`).join('');
    else if (f.type === 'location' && typeof val === 'object') display = `<i class="bi bi-geo-alt text-danger"></i> ${val.lat||'?'}, ${val.lng||'?'}`;
    else if (f.type === 'textarea') display = `<div class="bg-light rounded p-2" style="white-space:pre-wrap;font-size:.88rem;">${AUTH.esc(String(val))}</div>`;
    else if (f.type === 'url') display = `<a href="${AUTH.esc(String(val))}" target="_blank" rel="noopener">${AUTH.esc(String(val))}</a>`;
    else if (f.type === 'email') display = `<a href="mailto:${AUTH.esc(String(val))}">${AUTH.esc(String(val))}</a>`;
    else display = AUTH.esc(String(val));

    return `<tr><td class="fw-semibold text-nowrap" style="width:180px;vertical-align:top;">${AUTH.esc(f.label)}</td><td>${display}</td></tr>`;
  }).join('');

  const area = document.getElementById('tab-content');
  area.innerHTML = `
    <div class="d-flex align-items-center gap-3 mb-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="showTab('entity_${AUTH.esc(typeId)}',null)"><i class="bi bi-arrow-left me-1"></i>Retour</button>
      <h2 class="h5 fw-bold mb-0"><i class="bi bi-eye me-2"></i>Aperçu : ${AUTH.esc(type.name)}</h2>
      ${isBlocked ? '<span class="badge bg-warning text-dark">Bloqué</span>' : '<span class="badge bg-success">Actif</span>'}
    </div>
    <div class="card border-0 shadow-sm" style="border-radius:12px;max-width:800px;">
      <div class="card-body p-4">
        <table class="table table-borderless mb-0" style="font-size:.9rem;">
          <tbody>
            ${rows}
            <tr class="border-top"><td class="fw-semibold text-muted">Créé le</td><td>${AUTH.esc((rec._createdAt||'').slice(0,16).replace('T',' '))}</td></tr>
            <tr><td class="fw-semibold text-muted">Créé par</td><td>${AUTH.esc(rec._createdBy||'—')}</td></tr>
            ${rec._updatedAt ? `<tr><td class="fw-semibold text-muted">Modifié le</td><td>${AUTH.esc(rec._updatedAt.slice(0,16).replace('T',' '))} par ${AUTH.esc(rec._updatedBy||'—')}</td></tr>` : ''}
            ${rec._blockedAt ? `<tr><td class="fw-semibold text-muted">Bloqué le</td><td>${AUTH.esc(rec._blockedAt.slice(0,16).replace('T',' '))} par ${AUTH.esc(rec._blockedBy||'—')}</td></tr>` : ''}
          </tbody>
        </table>
      </div>
    </div>`;
}

/* ── Vider un acte (supprimer tous les enregistrements) ── */
function entityEmptyType(typeId) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) return;
  const allRecords = _getEntityRecords();
  const count = allRecords.filter(r => r._typeId === typeId && r._status !== 'supprime').length;
  if (!count) { alert('Aucun enregistrement à vider.'); return; }
  if (!confirm(`Vider l'acte « ${type.name} » ?\n\nCela marquera ${count} enregistrement(s) comme supprimé(s).\nCette action est irréversible.`)) return;
  const now = new Date().toISOString();
  allRecords.forEach(r => {
    if (r._typeId === typeId && r._status !== 'supprime') {
      r._status = 'supprime'; r._deletedAt = now; r._deletedBy = user.login || user.id;
    }
  });
  _saveEntityRecords(allRecords);
  showTab('entity_' + typeId, null);
}

/* ── Supprimer un acte (type + tables liées) ── */
function entityDeleteType(typeId) {
  const types = _getEntityTypes();

      <button class="btn btn-sm btn-outline-secondary" onclick="showTab('entity_${AUTH.esc(typeId)}',null)"><i class="bi bi-arrow-left me-1"></i>Retour</button>

      <div class="card-body p-4">
        <div class="alert alert-danger mb-3">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <strong>Attention !</strong> Cette action est irréversible.
        </div>
        <p class="mb-2">L'acte <strong>« ${AUTH.esc(type.name)} »</strong> contient <strong>${relatedCount}</strong> enregistrement(s) actif(s)/bloqué(s).</p>

function entityDeleteTypeConfirm(typeId, mode) {
  const types = _getEntityTypes();
  const type = types.find(x => x.id === typeId);
  if (!type) return;
  if (!confirm(`Confirmer la suppression de l'acte « ${type.name} » ?\n\nMode : ${mode === 'delete' ? 'Suppression totale (type + données)' : 'Vidage puis suppression du type'}`)) return;

  const allRecords = _getEntityRecords();
  const now = new Date().toISOString();

  if (mode === 'empty') {
    // Marquer tous les enregistrements comme supprimés (soft delete)
    allRecords.forEach(r => {
      if (r._typeId === typeId && r._status !== 'supprime') {
        r._status = 'supprime'; r._deletedAt = now; r._deletedBy = user.login || user.id;
      }
    });
    _saveEntityRecords(allRecords);
  } else {
    // Suppression définitive des enregistrements
    const remaining = allRecords.filter(r => r._typeId !== typeId);
    _saveEntityRecords(remaining);
  }

  // Supprimer le type
  const newTypes = types.filter(x => x.id !== typeId);
  localStorage.setItem('attt_entity_types', JSON.stringify(newTypes));
  if (typeof DB !== 'undefined') DB.save('attt_entity_types', newTypes);

  // Retour à l'accueil
  showTab('accueil', null);
  // Reconstruire la sidebar pour retirer l'entrée
  buildSidebar();
}

/* ═══════════════════════════════════════════════════════
   MISES À JOUR — Tester puis publier
═══════════════════════════════════════════════════════ */
function renderUpdatesPanel(area) {
  const canTest    = !AUTH.hasPermission || AUTH.hasPermission('Tester mise à jour', user);
  const canPublish = !AUTH.hasPermission || AUTH.hasPermission('Publier mise à jour', user);

  const K_UPDATES = 'attt_updates';
  let updates;
  try { updates = JSON.parse(localStorage.getItem(K_UPDATES) || '{}'); } catch { updates = {}; }
  if (!updates.history) updates.history = [];

  // Réconciliation : vérifier version.json du serveur (GitHub Pages)
  fetch('assets/version.json?t=' + Date.now(), { cache: 'no-store' }).then(r => r.ok ? r.json() : null).then(data => {
    if (data && data.version) {
      const serverV = data.version;
      const localV = updates.currentVersion || '';
      if (_cmpVer(serverV, localV) > 0) {
        // Ajouter l'entrée manquante dans l'historique
        if (!updates.history) updates.history = [];
        const alreadyIn = updates.history.some(h => h.version === serverV && h.action === 'publié');
        if (!alreadyIn) {
          updates.history.push({ version: serverV, notes: data.changelog || 'Déploiement automatique', action: 'publié', date: data.datePublication || new Date().toISOString(), by: 'deploy' });
        }
        updates.currentVersion = serverV;
        updates.publishedDate = data.datePublication || new Date().toISOString();
        // NE PAS pousser vers Firestore (sinon on écrase l'historique complet)
        localStorage.setItem(K_UPDATES, JSON.stringify(updates));
        localStorage.setItem('attt_version_json', JSON.stringify(data));
        renderUpdatesPanel(area); // re-render avec la bonne version
      }
    }
  }).catch(() => {});

  const current = updates.currentVersion || '—';
  // Calculer la prochaine version
  let nextVersion = '';
  if (current !== '—') {
    const p = current.split('.').map(Number);
    p[2] = (p[2] || 0) + 1;
    nextVersion = p.join('.');
  }
  const staged  = updates.stagedVersion || null;
  const stagedNotes = updates.stagedNotes || '';
  const stagedDate  = updates.stagedDate || '';
  const isPublished = !staged;

  let html = `
    <h2 class="h5 fw-bold mb-1"><i class="bi bi-cloud-arrow-up me-2"></i>Mises à jour</h2>
    <p class="text-muted small mb-4">Testez les modifications avant de les publier pour tous les utilisateurs.</p>

    <!-- Version actuelle -->
    <div class="card border-0 shadow-sm mb-3" style="border-radius:14px;">
      <div class="card-body d-flex align-items-center gap-3 p-3">
        <div style="width:48px;height:48px;border-radius:12px;background:#eef5ff;display:flex;align-items:center;justify-content:center;">
          <i class="bi bi-broadcast-pin fs-4" style="color:var(--cp);"></i>
        </div>
        <div>
          <div class="fw-bold">Version publiée</div>
          <div class="fs-4 fw-bold" style="color:var(--cp);">${AUTH.esc(current)}</div>
        </div>
        <span class="badge bg-success ms-auto">En production</span>
      </div>
    </div>

    <!-- Version en test -->
    ${staged ? `
    <div class="card border-warning shadow-sm mb-3" style="border-radius:14px;border-width:2px;">
      <div class="card-body p-3">
        <div class="d-flex align-items-center gap-3">
          <div style="width:48px;height:48px;border-radius:12px;background:#fff3cd;display:flex;align-items:center;justify-content:center;">
            <i class="bi bi-flask fs-4 text-warning"></i>
          </div>
          <div class="flex-grow-1">
            <div class="fw-bold">Version en test</div>
            <div class="fs-4 fw-bold text-warning">${AUTH.esc(staged)}</div>
            <div class="small text-muted mt-1">${stagedDate ? '<i class="bi bi-clock me-1"></i>Mise en test : ' + AUTH.esc(stagedDate.slice(0,16).replace('T',' ')) : ''}</div>
            ${stagedNotes ? `<div class="small mt-1"><i class="bi bi-card-text me-1"></i>${AUTH.esc(stagedNotes)}</div>` : ''}
          </div>
          <span class="badge bg-warning text-dark">En test</span>
        </div>
        <hr class="my-2">
        <div class="d-flex gap-2 flex-wrap">
          ${canPublish ? `<button class="btn btn-success btn-sm" onclick="updatePublish()"><i class="bi bi-check-circle me-1"></i>Publier pour tous</button>` : ''}
          ${canTest ? `<button class="btn btn-outline-danger btn-sm" onclick="updateCancelStaged()"><i class="bi bi-x-circle me-1"></i>Annuler cette mise en test</button>` : ''}
        </div>
      </div>
    </div>
    ` : ''}

    <!-- Formulaire : préparer une mise à jour -->
    ${canTest ? `
    <div class="card border-0 shadow-sm mb-3" style="border-radius:14px;">
      <div class="card-body p-3">
        <h3 class="h6 fw-bold mb-3"><i class="bi bi-plus-circle me-2"></i>Préparer une mise à jour</h3>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label small fw-semibold">Numéro de version</label>
            <input class="form-control" id="update-version" placeholder="ex: 1.0.7" value="${AUTH.esc(nextVersion)}">
          </div>
          <div class="col-md-8">
            <label class="form-label small fw-semibold">Notes de mise à jour</label>
            <textarea class="form-control" id="update-notes" rows="2" placeholder="Décrivez les changements…"></textarea>
          </div>
        </div>
        <div class="mt-3 d-flex flex-wrap gap-2 align-items-center">
          <button class="btn btn-warning btn-sm" onclick="updateStage()">
            <i class="bi bi-flask me-1"></i>Mettre en test
          </button>
          ${canPublish ? `<button class="btn btn-primary btn-sm" onclick="updateDirectPublish()">
            <i class="bi bi-rocket-takeoff me-1"></i>Publier directement
          </button>` : ''}
          <span class="text-muted small">La mise en test est visible uniquement par les testeurs autorisés</span>
        </div>
      </div>
    </div>
    ` : ''}

    <!-- Historique -->
    <div class="card border-0 shadow-sm" style="border-radius:14px;">
      <div class="card-body p-3">
        <h3 class="h6 fw-bold mb-3"><i class="bi bi-clock-history me-2"></i>Historique des mises à jour</h3>
        ${updates.history.length ? `
          <div class="list-group list-group-flush">
            ${updates.history.slice().reverse().map(h => `
              <div class="list-group-item px-0 py-2 border-bottom">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <span class="fw-bold">${AUTH.esc(h.version)}</span>
                    <span class="badge ${h.action === 'publié' ? 'bg-success' : h.action === 'test' ? 'bg-warning text-dark' : 'bg-secondary'} ms-2">${AUTH.esc(h.action)}</span>
                  </div>
                  <span class="small text-muted">${AUTH.esc((h.date||'').slice(0,16).replace('T',' '))}</span>
                </div>
                ${h.notes ? `<div class="small text-muted mt-1">${AUTH.esc(h.notes)}</div>` : ''}
                <div class="small text-muted">par ${AUTH.esc(h.by || '—')}</div>
              </div>
            `).join('')}
          </div>
        ` : '<div class="text-muted small">Aucun historique pour le moment.</div>'}
      </div>
    </div>`;

  area.innerHTML = html;
}

/* ── Actions mises à jour ── */
function _getUpdatesData() {
  try { return JSON.parse(localStorage.getItem('attt_updates') || '{}'); } catch { return {}; }
}
function _saveUpdatesData(data) {
  localStorage.setItem('attt_updates', JSON.stringify(data));
  if (typeof DB !== 'undefined') DB.save('attt_updates', data);
}
function _cmpVer(a, b) {
  if (!a) return -1; if (!b) return 1;
  const pa = String(a).split('.').map(Number), pb = String(b).split('.').map(Number);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const na = pa[i] || 0, nb = pb[i] || 0;
    if (na !== nb) return na - nb;
  }
  return 0;
}

function updateStage() {
  const version = (document.getElementById('update-version')?.value || '').trim();
  const notes = (document.getElementById('update-notes')?.value || '').trim();
  if (!version) { alert('Veuillez saisir un numéro de version.'); return; }
  if (!confirm(`Mettre la version ${version} en test ?`)) return;

  const data = _getUpdatesData();
  if (!data.history) data.history = [];
  data.stagedVersion = version;
  data.stagedNotes = notes;
  data.stagedDate = new Date().toISOString();
  data.stagedBy = user.login || user.id;
  data.history.push({ version, notes, action: 'test', date: data.stagedDate, by: data.stagedBy });
  _saveUpdatesData(data);
  showTab('mises-a-jour', null);
}

function updatePublish() {
  const data = _getUpdatesData();
  if (!data.stagedVersion) { alert('Aucune mise à jour en test.'); return; }
  if (!confirm(`Publier la version ${data.stagedVersion} pour tous les utilisateurs ?\n\nLa bannière de mise à jour sera affichée sur tous les appareils.`)) return;

  const now = new Date().toISOString();
  if (!data.history) data.history = [];
  data.history.push({ version: data.stagedVersion, notes: data.stagedNotes || '', action: 'publié', date: now, by: user.login || user.id });
  data.currentVersion = data.stagedVersion;
  data.publishedDate = now;
  data.publishedBy = user.login || user.id;

  // Mettre à jour version.json dans localStorage + Firestore
  try {
    let vj = {};
    try { vj = JSON.parse(localStorage.getItem('attt_version_json') || '{}'); } catch { vj = {}; }
    vj.version = data.stagedVersion;
    vj.datePublication = now.slice(0,10);
    vj.changelog = data.stagedNotes || 'Nouvelle version disponible';
    vj.forceUpdate = false;
    if (!vj.platforms) vj.platforms = {};
    ['windows','android','pwa'].forEach(p => {
      if (!vj.platforms[p]) vj.platforms[p] = {};
      vj.platforms[p].version = data.stagedVersion;
    });
    localStorage.setItem('attt_version_json', JSON.stringify(vj));
    if (typeof DB !== 'undefined') DB.save('attt_version_json', vj);
  } catch { /* */ }

  // Activer la bannière de mise à jour pour les utilisateurs
  var pubAt = new Date().toISOString();
  try {
    const ms = JSON.parse(localStorage.getItem('attt_master_settings') || '{}');
    ms.showUpdateBanner = true;
    ms.version = data.stagedVersion;
    ms.publishedAt = pubAt;
    localStorage.setItem('attt_master_settings', JSON.stringify(ms));
    if (typeof DB !== 'undefined') DB.save('attt_master_settings', ms);
  } catch { /* */ }

  data.stagedVersion = null;
  data.stagedNotes = '';
  data.stagedDate = '';
  data.stagedBy = '';
  _saveUpdatesData(data);

  // Synchroniser site_settings
  if (typeof SITE_SETTINGS !== 'undefined' && SITE_SETTINGS.updateSettings) {
    SITE_SETTINGS.updateSettings({ appVersion: data.currentVersion });
  }

  // Marquer la version comme vue sur l'appareil du maître (pas de bannière pour lui)
  localStorage.setItem('attt_seen_site_version', data.currentVersion);
  localStorage.setItem('attt_seen_publish_time', pubAt);

  showTab('mises-a-jour', null);
}

function updateCancelStaged() {

  data.currentVersion = version;
  data.publishedDate = now;
  data.publishedBy = user.login || user.id;
  data.stagedVersion = null;
  data.stagedNotes = '';
  data.stagedDate = '';
  data.stagedBy = '';
  _saveUpdatesData(data);

  // Synchroniser version_json
  try {
    let vj = {};
    try { vj = JSON.parse(localStorage.getItem('attt_version_json') || '{}'); } catch { vj = {}; }
    vj.version = version;
    vj.datePublication = now.slice(0,10);
    vj.changelog = notes || 'Nouvelle version disponible';
    vj.forceUpdate = false;
    if (!vj.platforms) vj.platforms = {};
    ['windows','android','pwa'].forEach(p => {
      if (!vj.platforms[p]) vj.platforms[p] = {};
      vj.platforms[p].version = version;
    });
    localStorage.setItem('attt_version_json', JSON.stringify(vj));
    if (typeof DB !== 'undefined') DB.save('attt_version_json', vj);
  } catch { /* */ }

  // Synchroniser master_settings
  try {
    const ms = JSON.parse(localStorage.getItem('attt_master_settings') || '{}');
    ms.showUpdateBanner = true;
    ms.version = version;
    ms.publishedAt = now;
    localStorage.setItem('attt_master_settings', JSON.stringify(ms));
    if (typeof DB !== 'undefined') DB.save('attt_master_settings', ms);
  } catch { /* */ }

  // Synchroniser site_settings
  if (typeof SITE_SETTINGS !== 'undefined' && SITE_SETTINGS.updateSettings) {
    SITE_SETTINGS.updateSettings({ appVersion: version });
  }

  // Pas de bannière pour le maître
  localStorage.setItem('attt_seen_site_version', version);

function masterTogglePass(i) {
  const h = document.getElementById('pass-hidden-' + i);

  if (h && v) {

  }

function renderAccueilTab(area) {
  const now = new Date();
  const nowStr = now.toISOString().slice(0,10);
  const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  const dateStr = now.getDate() + ' ' + MOIS[now.getMonth()] + ' ' + now.getFullYear();

  // Collecter les données
  let events = [], offers = [], voyages = [], conventions = [], locations = [], votes = [], specials = [];
  try { if (typeof EVENTS !== 'undefined' && EVENTS.getEvents) { events = EVENTS.getEvents(); specials = events.filter(e => e.special); } } catch(e){}
  try { if (typeof OFFERS !== 'undefined' && OFFERS.getOffers) offers = OFFERS.getOffers(); } catch(e){}
  try { if (typeof VOYAGES !== 'undefined' && VOYAGES.getVoyages) voyages = VOYAGES.getVoyages().filter(v => v.actif !== false); } catch(e){}
  try { if (typeof CONVENTIONS !== 'undefined' && CONVENTIONS.getConventions) conventions = CONVENTIONS.getConventions(); } catch(e){}
  try { if (typeof RENTALS !== 'undefined' && RENTALS.getRentals) locations = RENTALS.getRentals().filter(r => r.actif); } catch(e){}
  try { if (typeof VOTES !== 'undefined' && VOTES.getVotes) votes = VOTES.getVotes(); } catch(e){}

  const upcomingEvents = events.filter(e => e.dateDebut >= nowStr);
  const openVotes = votes.filter(v => new Date(v.dateDebut) <= now && new Date(v.dateFin) >= now);
