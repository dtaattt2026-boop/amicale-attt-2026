    html += `<div class="row g-4"><div class="col-lg-6">
      <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center" style="border-radius:12px 12px 0 0;">
          <span class="fw-bold"><i class="bi bi-calendar-event me-2" style="color:var(--cp);"></i>Prochains événements</span>
          <button class="btn btn-sm btn-outline-primary" onclick="showTab('events',null)" style="font-size:.78rem;">Voir tout</button>
        </div>
        <div class="card-body pt-0">`;
    nextEvents.forEach(ev => {
      const d = ev.dateDebut ? new Date(ev.dateDebut) : null;
      html += `<div class="d-flex gap-3 align-items-center py-2 ${nextEvents.indexOf(ev) < nextEvents.length-1 ? 'border-bottom' : ''}">
        ${d ? `<div class="text-center" style="min-width:45px;"><div class="fw-bold fs-5" style="color:var(--cp);line-height:1;">${d.getDate()}</div><div class="text-muted" style="font-size:.7rem;text-transform:uppercase;">${MOIS_SHORT[d.getMonth()]}</div></div>` : ''}
        <div class="flex-grow-1 min-w-0">
          <div class="fw-semibold text-truncate">${AUTH.esc(ev.titre)}</div>
          <div class="text-muted small">${AUTH.esc(ev.lieu||'')}${ev.placesDisponibles !== undefined ? ' · '+ev.placesDisponibles+' place(s)' : ''}</div>
        </div>
        ${ev.special ? '<span class="badge bg-danger">Spécial</span>' : ''}
      </div>`;
    });
    html += '</div></div></div>';
  }

  // ── VOTES EN COURS (max 3)
  if (openVotes.length) {
    html += `<div class="col-lg-6">
      <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center" style="border-radius:12px 12px 0 0;">
          <span class="fw-bold"><i class="bi bi-ballot me-2 text-primary"></i>Votes en cours</span>
          <button class="btn btn-sm btn-outline-primary" onclick="showTab('votes',null)" style="font-size:.78rem;">Voir tout</button>
        </div>
        <div class="card-body pt-0">`;
    openVotes.slice(0, 3).forEach((v, i) => {
      const ends = new Date(v.dateFin);
      const daysLeft = Math.ceil((ends - now) / 86400000);
      html += `<div class="d-flex gap-3 align-items-center py-2 ${i < Math.min(openVotes.length, 3)-1 ? 'border-bottom' : ''}">
        <div style="width:36px;height:36px;border-radius:8px;background:#0d6efd15;display:flex;align-items:center;justify-content:center;">
          <i class="bi bi-ballot" style="color:#0d6efd;"></i>
        </div>
        <div class="flex-grow-1 min-w-0">
          <div class="fw-semibold text-truncate">${AUTH.esc(v.titre)}</div>
          <div class="text-muted small">${v.choix ? v.choix.length + ' choix' : ''} · ${daysLeft > 0 ? daysLeft + 'j restant(s)' : 'Dernier jour !'}</div>
        </div>
        <button class="btn btn-sm btn-primary" style="font-size:.75rem;" onclick="showTab('votes',null)">Voter</button>
      </div>`;
    });
    html += '</div></div></div>';
  }

  // ── DERNIÈRES OFFRES (max 3)
  if (offers.length) {
    const recent = offers.slice(0, 3);
    html += `<div class="col-lg-6">
      <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center" style="border-radius:12px 12px 0 0;">
          <span class="fw-bold"><i class="bi bi-tag me-2" style="color:#f59e0b;"></i>Offres récentes</span>
          <button class="btn btn-sm btn-outline-warning" onclick="showTab('offres',null)" style="font-size:.78rem;color:#b45309;">Voir tout</button>
        </div>
        <div class="card-body pt-0">`;
    recent.forEach((o, i) => {
      html += `<div class="d-flex gap-3 align-items-center py-2 ${i < recent.length-1 ? 'border-bottom' : ''}">
        <div style="width:36px;height:36px;border-radius:8px;background:#f59e0b15;display:flex;align-items:center;justify-content:center;">
          <i class="bi bi-tag" style="color:#f59e0b;"></i>
        </div>
        <div class="flex-grow-1 min-w-0">
          <div class="fw-semibold text-truncate">${AUTH.esc(o.titre)}</div>
          <div class="text-muted small">${AUTH.esc(o.description||'').slice(0,60)}${o.dateExpiration ? ' · Expire : ' + fmtDate(o.dateExpiration) : ''}</div>
        </div>
      </div>`;
    });
    html += '</div></div></div>';
  }

  // ── VOYAGES DISPONIBLES (max 3)
  if (voyages.length) {
    const recent = voyages.slice(0, 3);
    html += `<div class="col-lg-6">
      <div class="card border-0 shadow-sm" style="border-radius:12px;">
        <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center" style="border-radius:12px 12px 0 0;">
          <span class="fw-bold"><i class="bi bi-compass me-2" style="color:#2e7d32;"></i>Voyages disponibles</span>
          <button class="btn btn-sm btn-outline-success" onclick="showTab('voyages',null)" style="font-size:.78rem;">Voir tout</button>
        </div>
        <div class="card-body pt-0">`;
    recent.forEach((v, i) => {
      html += `<div class="d-flex gap-3 align-items-center py-2 ${i < recent.length-1 ? 'border-bottom' : ''}">
        <div style="width:36px;height:36px;border-radius:8px;background:#2e7d3215;display:flex;align-items:center;justify-content:center;">
          <i class="bi bi-compass" style="color:#2e7d32;"></i>
        </div>
        <div class="flex-grow-1 min-w-0">
          <div class="fw-semibold text-truncate">${AUTH.esc(v.titre)}</div>
          <div class="text-muted small">${fmtDate(v.dateDebut)} → ${fmtDate(v.dateFin)}${v.prix ? ' · ' + v.prix + ' TND' : ''}</div>
        </div>
      </div>`;
    });
    html += '</div></div></div>';
  }

  // Close row
  if (nextEvents.length || openVotes.length || offers.length || voyages.length) html += '</div>';

  // ── RACCOURCIS RAPIDES
  html += `
  <div class="mt-4">
    <h6 class="fw-bold text-muted mb-3"><i class="bi bi-lightning me-1"></i>Accès rapide</h6>
    <div class="d-flex flex-wrap gap-2">
      <a href="profil.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-person-circle me-1"></i>Mon profil</a>
      <a href="messagerie.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-chat-text me-1"></i>Messages</a>
      <button class="btn btn-outline-secondary btn-sm" onclick="showTab('locations',null)"><i class="bi bi-house-heart me-1"></i>Locations</button>
      <a href="galerie.html" target="_blank" class="btn btn-outline-secondary btn-sm"><i class="bi bi-images me-1"></i>Galerie</a>
      <a href="actualites.html" target="_blank" class="btn btn-outline-secondary btn-sm"><i class="bi bi-newspaper me-1"></i>Actualités</a>
    </div>
  </div>

  <!-- ── INVITATIONS ── -->
  <div class="mt-4">
    <div class="card border-0 shadow-sm" style="border-radius:12px;">
      <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center" style="border-radius:12px 12px 0 0;">
        <span class="fw-bold"><i class="bi bi-person-plus me-2" style="color:var(--couleur-principale);"></i>Inviter quelqu'un</span>
      </div>
      <div class="card-body pt-2">
        <p class="text-muted small mb-3">Envoyez un lien d'invitation. L'inscrit sera validé automatiquement.</p>
        <div class="row g-2 align-items-end">
          <div class="col-sm-5">
            <label class="form-label fw-semibold small mb-1">Rôle à attribuer</label>
            <select class="form-select form-select-sm" id="invite-role"></select>
          </div>
          <div class="col-sm-7">
            <button class="btn btn-attt btn-sm w-100" onclick="generateInvitationLink()">
              <i class="bi bi-link-45deg me-1"></i>Générer le lien
            </button>
          </div>
        </div>
        <div id="invitation-result" class="d-none mt-3">
          <div class="input-group input-group-sm mb-2">
            <input type="text" class="form-control bg-light" id="invite-link-input" readonly />
            <button class="btn btn-outline-secondary" onclick="copyInviteLink()" title="Copier">
              <i class="bi bi-clipboard"></i>
            </button>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <a id="invite-whatsapp" href="#" target="_blank" class="btn btn-sm btn-success">
              <i class="bi bi-whatsapp me-1"></i>WhatsApp
            </a>
            <a id="invite-sms" href="#" class="btn btn-sm btn-primary">
              <i class="bi bi-chat-dots me-1"></i>SMS
            </a>
            <a id="invite-email-link" href="#" class="btn btn-sm btn-secondary">
              <i class="bi bi-envelope me-1"></i>E-mail
            </a>
            <button class="btn btn-sm btn-outline-dark" onclick="shareInviteNative()">
              <i class="bi bi-share me-1"></i>Partager
            </button>
          </div>
        </div>
        <!-- Historique invitations -->
        <div class="mt-3" id="my-invitations-list"></div>
      </div>
    </div>
  </div>`;

  area.innerHTML = html;

  // Remplir les rôles d'invitation
  renderInviteRoles();
  renderMyInvitations();
}

/* ═══════════════════════════════════════════════════════
   INVITATIONS
═══════════════════════════════════════════════════════ */
function renderInviteRoles() {
  const sel = document.getElementById('invite-role');
  if (!sel) return;
  const roles = AUTH.getInvitableRoles(user);
  sel.innerHTML = roles.map(roleId => `<option value="${AUTH.esc(roleId)}">${AUTH.esc(AUTH.getRoleLabel(roleId))}</option>`).join('');
}

function generateInvitationLink() {
  const roleId = document.getElementById('invite-role')?.value;
  if (!roleId) return alert('Choisissez un rôle.');
  const result = AUTH.createInvitation(user, roleId);
  if (!result.ok) return alert(result.msg);
  const link = AUTH.buildInvitationLink(result.invitation.code);
  const msg = 'Rejoignez l\'Amicale ATTT ! Inscrivez-vous via ce lien : ' + link;

  document.getElementById('invite-link-input').value = link;
  document.getElementById('invite-whatsapp').href = 'https://wa.me/?text=' + encodeURIComponent(msg);
  document.getElementById('invite-sms').href = 'sms:?body=' + encodeURIComponent(msg);
  document.getElementById('invite-email-link').href = 'mailto:?subject=' + encodeURIComponent('Invitation Amicale ATTT') + '&body=' + encodeURIComponent(msg);
  document.getElementById('invitation-result').classList.remove('d-none');
  renderMyInvitations();
}

function copyInviteLink() {
  const input = document.getElementById('invite-link-input');
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = input.nextElementSibling;
    btn.innerHTML = '<i class="bi bi-check text-success"></i>';
    setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard"></i>'; }, 2000);
  });
}

function shareInviteNative() {
  const link = document.getElementById('invite-link-input')?.value;
  if (navigator.share) {
    navigator.share({ title: 'Invitation Amicale ATTT', text: 'Rejoignez l\'Amicale ATTT !', url: link });
  } else {
    copyInviteLink();
  }
}

function renderMyInvitations() {
  const container = document.getElementById('my-invitations-list');
  if (!container) return;
  const invitations = AUTH.getMyInvitations(user.id);
  if (!invitations.length) { container.innerHTML = ''; return; }
  const allUsers = AUTH.getUsers();
  const rows = invitations.slice().reverse().slice(0, 10).map(inv => {
    const date = new Date(inv.createdAt).toLocaleDateString('fr-FR');

    // Détection fiable : chercher un utilisateur inscrit via cette invitation
    let isUsed = false;
    let usedByName = '';

    // 1. Chercher un utilisateur qui a invitationId === inv.id (lien direct)
    const directMatch = allUsers.find(u => u.invitationId === inv.id);
    if (directMatch) {
      isUsed = true;
      usedByName = directMatch.prenom + ' ' + directMatch.nom;
    }
    // 2. Si le flag usedBy est renseigné
    if (!isUsed && inv.usedBy) {
      const match = allUsers.find(u => u.id === inv.usedBy);
      if (match) { isUsed = true; usedByName = match.prenom + ' ' + match.nom; }
      else { isUsed = true; }
    }
    // 3. Flag used direct
    if (!isUsed && inv.used) {
      isUsed = true;
    }
    // 4. Dernier recours : chercher par validateurId + date
    if (!isUsed) {
      const match = allUsers.find(u =>
        u.validateurId === inv.inviterId &&
        u.statut === 'actif' &&
        u.dateInscription && inv.createdAt &&
        u.dateInscription >= inv.createdAt.slice(0, 10)
      );
      if (match) { isUsed = true; usedByName = match.prenom + ' ' + match.nom; }
    }

    const status = isUsed
      ? '<span class="badge bg-success">Utilisée</span>'
      : '<span class="badge bg-warning text-dark">En attente</span>';
    const revokeBtn = isUsed ? '' : `<button class="btn btn-outline-danger btn-sm py-0 px-1" onclick="revokeInvite('${AUTH.esc(inv.id)}')" title="Révoquer"><i class="bi bi-x-lg" style="font-size:.7rem;"></i></button>`;
    return `<tr>
      <td class="small"><code>${AUTH.esc(inv.code)}</code></td>
      <td class="small">${AUTH.esc(AUTH.getRoleLabel(inv.targetRole))}</td>
      <td class="small">${date}</td>
      <td>${status}${usedByName ? '<br><span class="text-muted" style="font-size:.72rem;">par ' + AUTH.esc(usedByName) + '</span>' : ''}</td>
      <td class="text-end">${revokeBtn}</td>
    </tr>`;
  }).join('');
  container.innerHTML = `
    <details>
      <summary class="small fw-semibold text-muted" style="cursor:pointer;"><i class="bi bi-clock-history me-1"></i>Mes invitations (${invitations.length})</summary>
      <table class="table table-sm table-hover mt-2 mb-0" style="font-size:.82rem;">
        <thead><tr><th>Code</th><th>Rôle</th><th>Date</th><th>Statut</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </details>`;
}

function revokeInvite(invId) {
  if (!confirm('Révoquer cette invitation ?')) return;
  AUTH.revokeInvitation(invId, user.id);
  renderMyInvitations();
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
DB_READY.then(() => {
  // Welcome bar
  document.getElementById('welcome-title').textContent = 'Bonjour, ' + (user.prenom || user.login) + ' !';
  document.getElementById('welcome-sub').textContent   = user.email ? user.email : '';
  const roleBadge = document.getElementById('user-role-badge');
  const ROLE_LABELS = { famille:'Membre', membre:'Membre', delegue:'Délégué', direction:'Direction', admin:'Administrateur' };
  if (roleBadge) roleBadge.textContent = ROLE_LABELS[user.role] || user.role;

  // Build sidebar
  buildSidebar();

  // Update badges
  function setBadge(id, count) {
    if (!count) return;
    const el = document.getElementById('sb-cnt-'+id);
    if (el) { el.textContent = count; el.classList.remove('d-none'); }
  }

  try {
    const now = new Date().toISOString().slice(0,10);
    if (typeof EVENTS !== 'undefined' && EVENTS.getEvents) {
      const evts = EVENTS.getEvents().filter(e => e.dateDebut >= now);
      setBadge('events', evts.length);
      const spec = evts.filter(e => e.special);
      setBadge('special', spec.length);
    }
    if (typeof OFFERS !== 'undefined' && OFFERS.getOffers) setBadge('offres', OFFERS.getOffers().length);
    if (typeof VOYAGES !== 'undefined' && VOYAGES.getVoyages) setBadge('voyages', VOYAGES.getVoyages().filter(v=>v.actif!==false).length);
    if (typeof CONVENTIONS !== 'undefined' && CONVENTIONS.getConventions) setBadge('conventions', CONVENTIONS.getConventions().length);
    if (typeof RENTALS !== 'undefined' && RENTALS.getRentals) setBadge('locations', RENTALS.getRentals().filter(r=>r.actif).length);
    if (typeof VOTES !== 'undefined' && VOTES.getVotes) {
      const n = new Date();
      const openV = VOTES.getVotes().filter(v => new Date(v.dateDebut)<=n && new Date(v.dateFin)>=n);
      setBadge('votes', openV.length);
    }
  } catch(e){}

  // Badges actes personnalisés
  try {
    _getEntityTypes().forEach(t => {
      const count = _getEntityRecords().filter(r => r._typeId === t.id && r._status === 'actif').length;
      setBadge('entity_' + t.id, count);
    });
  } catch(e){}

  // Messages badge
  try {
    if (typeof MESSAGING !== 'undefined' && MESSAGING.getUnread) {
      const unread = MESSAGING.getUnread(user.id).length;
      if (unread > 0) {
        const b = document.getElementById('msg-badge');
        if (b) { b.textContent = unread; b.style.display = ''; }
      }
    }
  } catch(e){}

  // Show first tab
  renderTab('accueil', document.getElementById('tab-content'));

  // Apply permissions
  AUTH.applyPermissions && AUTH.applyPermissions(document.body, user);
});
