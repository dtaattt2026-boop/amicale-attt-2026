<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amicale ATTT — Gestion des actualités</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <style>
    .sidebar { min-height: calc(100vh - 58px); background: var(--couleur-principale); }
    .sidebar .nav-link { color: rgba(255,255,255,.75); border-radius: 8px; transition: background .2s; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }
    @media(max-width:767px) { .sidebar { min-height: auto; } }
    .table th { font-size:.83rem; text-transform:uppercase; letter-spacing:.04em; color:#6c757d; }
    .empty-state { text-align:center; padding:3rem 1rem; color:#6c757d; }
    .empty-state i { font-size:3rem; display:block; opacity:.35; margin-bottom:.75rem; }
    #photo-preview { max-width:100%; max-height:200px; border-radius:8px; object-fit:cover; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <nav class="navbar navbar-dark py-2" style="background:var(--couleur-principale);">
    <div class="container-fluid px-3 d-flex justify-content-between">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2 fs-6" href="index.html">
        <img src="img/logo_attt.jpeg" alt="Logo" style="height:32px;border-radius:6px;" onerror="this.style.display='none'">Amicale ATTT
        <span id="topbar-role-badge" class="badge bg-warning text-dark ms-2"></span>
      </a>
      <div class="d-flex align-items-center gap-2">
        <span class="text-white-50 small d-none d-md-block" id="topbar-user"></span>
        <a href="espace-membre.html" class="btn btn-outline-light btn-sm">
          <i class="bi bi-person-circle me-1"></i>Mon espace
        </a>
        <a href="#" class="btn btn-danger btn-sm" onclick="AUTH.logout();return false;" title="Déconnexion">
          <i class="bi bi-box-arrow-right"></i>
        </a>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">

      <!-- SIDEBAR -->
      <div class="col-md-2 sidebar pt-4 pb-3">
        <ul class="nav flex-column gap-1 px-2" id="sidebar-nav">
          <!-- rempli dynamiquement selon le rôle -->
        </ul>
      </div>

      <!-- CONTENU PRINCIPAL -->
      <div class="col-md-10 py-4 px-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h4 class="mb-0 fw-bold">Gestion des actualités</h4>
            <p class="text-muted small mb-0">Publiez, modifiez ou supprimez les articles / actualités.</p>
          </div>
          <button class="btn btn-primary" data-perm="Publier article avec photo" data-perm-mode="action" onclick="openArticleModal(null)">
            <i class="bi bi-plus-lg me-1"></i>Nouvel article
          </button>
        </div>

        <!-- Filtres -->
        <div class="row g-2 mb-3">
          <div class="col-auto">
            <select class="form-select form-select-sm" id="filter-cat" onchange="renderArticles()">
              <option value="tous">Toutes catégories</option>
              <option value="annonce">Annonce</option>
              <option value="actualite">Actualité</option>
              <option value="sport">Sport</option>
              <option value="culture">Culture</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div class="col-auto">
            <select class="form-select form-select-sm" id="filter-acces" onchange="renderArticles()">
              <option value="">Tout accès</option>
              <option value="tous">Public (tous)</option>
              <option value="membres">Membres uniquement</option>
            </select>
          </div>
        </div>

        <!-- Tableau des articles -->
        <div class="card p-0 overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Photo</th>
                  <th>Titre</th>
                  <th>Catégorie</th>
                  <th>Accès</th>
                  <th>Auteur</th>
                  <th>Date</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="articles-tbody">
                <tr><td colspan="7" class="text-center text-muted py-4">Chargement…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div><!-- /col -->
    </div><!-- /row -->
  </div><!-- /container-fluid -->

  <!-- ════════════════════════════════════════════════ -->
  <!-- Modal article                                    -->
  <!-- ════════════════════════════════════════════════ -->
  <div class="modal fade" id="articleModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="articleModalLabel">Nouvel article</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="art-id" />
          <div class="row g-3">

            <div class="col-12">
              <label class="form-label fw-semibold">Titre <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="art-titre" maxlength="120"
                     placeholder="Titre de l'article" />
            </div>

            <div class="col-md-4">
              <label class="form-label fw-semibold">Catégorie</label>
              <select class="form-select" id="art-categorie">
                <option value="annonce">Annonce</option>
                <option value="actualite">Actualité</option>
                <option value="sport">Sport</option>
                <option value="culture">Culture</option>
                <option value="autre">Autre</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label fw-semibold">Accès</label>
              <select class="form-select" id="art-acces">
                <option value="tous">Public (tous)</option>
                <option value="membres">Membres uniquement</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label fw-semibold">Date de publication</label>
              <input type="date" class="form-control" id="art-date" />
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Résumé</label>
              <textarea class="form-control" id="art-resume" rows="2" maxlength="300"
                        placeholder="Courte description (affiché dans la liste des articles)"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Contenu complet</label>
              <textarea class="form-control" id="art-corps" rows="6"
                        placeholder="Corps de l'article (HTML basique accepté)"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label fw-semibold">Photo</label>
              <input type="file" class="form-control" id="art-photo-file" accept="image/*"
                     onchange="previewPhoto(this)" />
              <input type="hidden" id="art-photo-url" />
              <div id="photo-preview-wrap" class="mt-2 d-none">
                <img id="photo-preview" src="" alt="Aperçu" />
                <button type="button" class="btn btn-sm btn-outline-danger mt-1 d-block"
                        onclick="clearPhoto()">
                  <i class="bi bi-x-circle me-1"></i>Supprimer la photo
                </button>
              </div>
              <div id="art-photo-upload-state" class="form-text">La photo sera envoyée vers le stockage distant au moment de l'enregistrement.</div>
            </div>

          </div><!-- /row -->
        </div><!-- /modal-body -->
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button type="button" class="btn btn-primary" data-perm="Publier article avec photo" data-perm-mode="action" onclick="saveArticle()">
            <i class="bi bi-save me-1"></i>Enregistrer
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════ -->
  <!-- Scripts                                          -->
  <!-- ════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Firebase SDK (Base de données Cloud) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/log.js"></script>
  <script src="js/media-upload.js"></script>
  <script src="js/contenu.js"></script>
  <script>
    const user = AUTH.requireAuth('admin');
    if (!user) throw new Error();
    if (!AUTH.hasPermission('Accéder page Actualités', user, null, 'action')) {
      alert('Accès refusé à la gestion des actualités.');
      history.back();
      throw new Error('Permission refusée');
    }

    const RL = AUTH.ROLE_LABELS;
    document.getElementById('topbar-user').textContent   = user.prenom + ' ' + user.nom;
    document.getElementById('topbar-role-badge').textContent = RL[user.role] || user.role;

    /* ─── Sidebar selon le rôle ──────────────────────── */
    (function buildSidebar() {
      const nav = document.getElementById('sidebar-nav');
      const link = (href, icon, label, active) => `
        <li class="nav-item">
          <a href="${href}" class="nav-link${active?' active':''}">
            <i class="bi bi-${icon} me-2"></i>${label}
          </a>
        </li>`;
      let html = link('contenu-admin.html', 'file-richtext', 'Actualités', true);
      if (user.role === 'admin') {
        html = link('admin.html', 'speedometer2', 'Tableau de bord', false) + link('publicites.html', 'badge-ad', 'Publicités accueil', false) + html;
      } else if (user.role === 'superviseur') {
        html = link('superviseur.html', 'speedometer2', 'Tableau de bord', false) + link('publicites.html', 'badge-ad', 'Publicités accueil', false) + html;
      } else if (user.role === 'master') {
        html = link('master.html', 'speedometer2', 'Tableau de bord', false) + link('publicites.html', 'badge-ad', 'Publicités accueil', false) + html;
      }
      nav.innerHTML = html;
      AUTH.applyPermissions(nav, user);
    })();

    /* ─── Badges catégories ──────────────────────────── */
    const CAT_BADGE = {
      annonce: 'primary', actualite: 'info', sport: 'success',
      culture: 'warning', autre: 'secondary'
    };
    const CAT_LABEL = {
      annonce: 'Annonce', actualite: 'Actualité', sport: 'Sport',
      culture: 'Culture', autre: 'Autre'
    };

    /* ─── Rendu tableau ──────────────────────────────── */
    function renderArticles() {
      const cat   = document.getElementById('filter-cat').value;
      const acces = document.getElementById('filter-acces').value;
      const list  = CONTENU.getArticles({
        categorie: cat   !== 'tous' ? cat   : null,
        acces:     acces !== ''     ? acces : null
      });
      const tbody = document.getElementById('articles-tbody');
      if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Aucun article trouvé.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(a => `
        <tr>
          <td style="width:64px">
            ${a.photo
              ? `<img src="${a.photo}" alt="" style="width:56px;height:40px;object-fit:cover;border-radius:4px;">`
              : `<span class="text-muted small">—</span>`}
          </td>
          <td>
            <div class="fw-semibold">${AUTH.esc(a.titre)}</div>
            <div class="text-muted small text-truncate" style="max-width:280px">${AUTH.esc(a.resume||'')}</div>
          </td>
          <td><span class="badge bg-${CAT_BADGE[a.categorie]||'secondary'}">${CAT_LABEL[a.categorie]||AUTH.esc(a.categorie)}</span></td>
          <td>${a.acces === 'membres'
                ? '<span class="badge bg-warning text-dark">Membres</span>'
                : '<span class="badge bg-light text-dark border">Public</span>'}</td>
          <td class="text-muted small">${AUTH.esc(a.auteurLogin||'—')}</td>
          <td class="text-muted small">${AUTH.esc(a.datePublication||'—')}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary me-1" data-perm="Modifier / supprimer article" data-perm-mode="action" onclick='openArticleModal(${JSON.stringify(a)})'>
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" data-perm="Modifier / supprimer article" data-perm-mode="action" onclick="delArticle('${AUTH.esc(a.id)}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`).join('');
      AUTH.applyPermissions(tbody, user);
    }

    /* ─── Modal article ──────────────────────────────── */
    const artModal = new bootstrap.Modal(document.getElementById('articleModal'));

    function openArticleModal(a) {
      const permission = a ? 'Modifier / supprimer article' : 'Publier article avec photo';
      if (!AUTH.hasPermission(permission, user, null, 'action')) {
        alert('Droits insuffisants pour cette action.');
        return;
      }
      document.getElementById('articleModalLabel').textContent = a ? "Modifier l'article" : 'Nouvel article';
      document.getElementById('art-id').value        = a?.id        || '';
      document.getElementById('art-titre').value     = a?.titre     || '';
      document.getElementById('art-resume').value    = a?.resume    || '';
      document.getElementById('art-corps').value     = a?.corps     || '';
      document.getElementById('art-categorie').value = a?.categorie || 'annonce';
      document.getElementById('art-acces').value     = a?.acces     || 'tous';
      document.getElementById('art-date').value      = a?.datePublication || new Date().toISOString().slice(0,10);
      document.getElementById('art-photo-file').value = '';
      document.getElementById('art-photo-url').value = a?.photo || '';
      document.getElementById('art-photo-upload-state').textContent = 'La photo sera envoyée vers le stockage distant au moment de l\'enregistrement.';
      /* Réinitialise la prévisualisation */
      if (a?.photo) {
        document.getElementById('photo-preview').src = a.photo;
        document.getElementById('photo-preview-wrap').classList.remove('d-none');
      } else {
        clearPhoto();
      }
      artModal.show();
    }

    function clearPhoto() {
      document.getElementById('photo-preview').src = '';
      document.getElementById('photo-preview-wrap').classList.add('d-none');
      document.getElementById('art-photo-url').value = '';
      document.getElementById('art-photo-file').value = '';
      document.getElementById('art-photo-upload-state').textContent = 'Aucune photo sélectionnée.';
    }

    /* ─── Prévisualisation photo locale ─────────── */
    function previewPhoto(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (!file.type.startsWith('image/')) { alert('Veuillez sélectionner un fichier image.'); return; }
      document.getElementById('photo-preview').src = URL.createObjectURL(file);
      document.getElementById('photo-preview-wrap').classList.remove('d-none');
      document.getElementById('art-photo-upload-state').textContent = `Fichier prêt : ${file.name}`;
    }

    /* ─── Sauvegarde ─────────────────────────────────── */
    async function saveArticle() {
      const titre = document.getElementById('art-titre').value.trim();
      if (!titre) { alert('Le titre est requis.'); return; }
      const id = document.getElementById('art-id').value;
      const permission = id ? 'Modifier / supprimer article' : 'Publier article avec photo';
      if (!AUTH.hasPermission(permission, user, null, 'action')) {
        alert('Droits insuffisants pour enregistrer cet article.');
        return;
      }
      const fileInput = document.getElementById('art-photo-file');
      const status = document.getElementById('art-photo-upload-state');
      let photoUrl = document.getElementById('art-photo-url').value.trim() || null;
      const file = fileInput.files?.[0];
      if (file) {
        if (!MEDIA_UPLOAD.isAvailable()) {
          alert('Stockage des médias indisponible.');
          return;
        }
        try {
          status.textContent = 'Téléversement en cours…';
          const result = await MEDIA_UPLOAD.uploadFile(file, 'articles');
          photoUrl = result.url;
          document.getElementById('art-photo-url').value = photoUrl;
          status.textContent = 'Photo envoyée avec succès.';
        } catch (error) {
          status.textContent = error.message || 'Échec du téléversement.';
          alert('Impossible de téléverser la photo : ' + (error.message || error));
          return;
        }
      }
      const data = {
        titre,
        resume:          document.getElementById('art-resume').value.trim(),
        corps:           document.getElementById('art-corps').value.trim(),
        photo:           photoUrl,
        categorie:       document.getElementById('art-categorie').value,
        acces:           document.getElementById('art-acces').value,
        auteurId:        user.id,
        auteurLogin:     user.login,
        datePublication: document.getElementById('art-date').value
      };
      if (id) {
        CONTENU.updateArticle(id, data);
        LOG.add('ARTICLE_EDIT', { acteurId: user.id, acteurLogin: user.login, acteurRole: user.role, detail: data.titre });
      } else {
        CONTENU.addArticle(data);
        LOG.add('ARTICLE_ADD',  { acteurId: user.id, acteurLogin: user.login, acteurRole: user.role, detail: data.titre });
      }
      artModal.hide();
      renderArticles();
    }

    function delArticle(id) {
      if (!AUTH.hasPermission('Modifier / supprimer article', user, null, 'action')) {
        alert('Droits insuffisants pour supprimer cet article.');
        return;
      }
      const a = CONTENU.getArticle(id);
      if (!confirm('Supprimer l\'article « ' + (a?.titre || '') + ' » ?')) return;
      CONTENU.deleteArticle(id);
      LOG.add('ARTICLE_DEL', { acteurId: user.id, acteurLogin: user.login, acteurRole: user.role, detail: a?.titre });
      renderArticles();
    }

    /* ─── Init ───────────────────────────────────────── */
    DB_READY.then(() => {
      renderArticles();
      if (typeof MEDIA_UPLOAD !== 'undefined') MEDIA_UPLOAD.prewarmDriveToken();
    });
  </script>
</body>
</html>
