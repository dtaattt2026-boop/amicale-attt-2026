<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amicale ATTT — Mon Profil</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003DA6" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <style>
    :root { --cp:#003DA6; }
    body { background:#f0f2f8; min-height:100vh; }

    /* NAV */
    .top-nav { background:var(--cp); padding:.55rem 1.25rem; display:flex; align-items:center; gap:1rem; }
    .brand { color:#fff; font-weight:800; font-size:1.05rem; text-decoration:none; display:flex; align-items:center; gap:.5rem; flex:1; }
    .btn-nav { border:1px solid rgba(255,255,255,.3); color:#fff!important; border-radius:8px; padding:.35rem .75rem; font-size:.82rem; font-weight:600; background:transparent; text-decoration:none; transition:background .15s; display:inline-flex; align-items:center; gap:.3rem; }
    .btn-nav:hover { background:rgba(255,255,255,.15); }
    .btn-logout { background:#dc3545; border-color:#dc3545; }
    .btn-logout:hover { background:#c82333; }

    /* HERO */
    .profile-hero { background:linear-gradient(135deg,var(--cp),#0056cc); color:white; padding:2.5rem 1.5rem; }
    .avatar-ring { width:100px; height:100px; border-radius:50%; border:4px solid rgba(255,255,255,.4); object-fit:cover; }
    .avatar-placeholder { width:100px; height:100px; border-radius:50%; border:4px solid rgba(255,255,255,.4); background:rgba(255,255,255,.18); display:flex; align-items:center; justify-content:center; font-size:2.5rem; color:rgba(255,255,255,.7); }

    /* TABS */
    .profile-tabs { background:#fff; border-bottom:2px solid #e9ecef; overflow-x:auto; display:flex; gap:.15rem; padding:0 1rem; flex-shrink:0; }
    .ptab { border:none; background:none; padding:.75rem 1.1rem; font-size:.88rem; font-weight:600; color:#6c757d; border-bottom:3px solid transparent; cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; }
    .ptab:hover { color:var(--cp); }
    .ptab.active { color:var(--cp); border-bottom-color:var(--cp); }

    /* CONTENT */
    .profile-content { padding:1.5rem; max-width:900px; margin:0 auto; }

    /* CARDS */
    .info-card { background:#fff; border-radius:16px; box-shadow:0 2px 12px rgba(0,0,0,.07); padding:1.5rem; margin-bottom:1.25rem; }
    .info-card h3 { font-weight:800; font-size:1rem; margin-bottom:1rem; color:#0d1b2a; }

    /* DELEGUE CARD */
    .delegue-card { background:linear-gradient(135deg,#e8efff,#d0e0ff); border:1.5px solid #b3ccff; border-radius:14px; padding:1.25rem; }

    /* FAMILY MEMBER */
    .fam-item { display:flex; align-items:center; gap:.85rem; padding:.75rem; border:1px solid #e9ecef; border-radius:12px; margin-bottom:.5rem; background:#fff; }
    .fam-avatar { width:44px; height:44px; border-radius:50%; background:var(--cp); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.95rem; flex-shrink:0; }

    /* HISTORY */
    .hist-item { display:flex; align-items:flex-start; gap:1rem; padding:.9rem; border-left:4px solid var(--cp); border-radius:0 10px 10px 0; background:#fff; margin-bottom:.6rem; box-shadow:0 1px 6px rgba(0,0,0,.05); }
    .hist-icon { width:40px; height:40px; border-radius:10px; background:#e8efff; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }

    /* MESSAGING */
    .msg-item { padding:.85rem 1rem; border:1px solid #e9ecef; border-radius:12px; margin-bottom:.5rem; background:#fff; cursor:pointer; transition:box-shadow .15s; }
    .msg-item:hover { box-shadow:0 3px 12px rgba(0,61,166,.1); }
    .msg-item.unread { border-left:4px solid var(--cp); background:#f5f8ff; }
    .msg-item .msg-from { font-weight:700; font-size:.88rem; }
    .msg-item .msg-sub  { font-size:.83rem; color:#6c757d; }
    .msg-item .msg-date { font-size:.75rem; color:#adb5bd; }
    .user-select-item { display:flex; align-items:center; gap:.6rem; padding:.5rem .75rem; border-radius:9px; cursor:pointer; transition:background .15s; }
    .user-select-item:hover { background:#f0f4ff; }
    .user-select-item .u-avatar { width:34px; height:34px; border-radius:50%; background:var(--cp); color:#fff; display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; flex-shrink:0; }
    .selected-user { background:#e0eaff; border:1.5px solid var(--cp); border-radius:999px; padding:.2rem .65rem .2rem .4rem; display:inline-flex; align-items:center; gap:.3rem; font-size:.82rem; margin:.15rem; }

    /* BTN */
    .btn-attt { background:var(--cp); color:#fff; border:none; border-radius:9px; font-weight:700; padding:.55rem 1.4rem; transition:background .2s; }
    .btn-attt:hover { background:#004fd6; color:#fff; }
    .btn-oa { border:2px solid var(--cp); color:var(--cp); border-radius:9px; font-weight:700; padding:.5rem 1.2rem; background:transparent; transition:all .2s; }
    .btn-oa:hover { background:var(--cp); color:#fff; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);} }
    .tab-pane-anim { animation:fadeIn .2s ease; }
  </style>
</head>
<body>

  <!-- NAV -->
  <div class="top-nav">
    <a href="espace-membre.html" class="brand"><img src="img/logo_attt.jpeg" alt="Logo" style="height:30px;border-radius:6px;" onerror="this.style.display='none'">Amicale ATTT</a>
    <a href="espace-membre.html" class="btn-nav"><i class="bi bi-house"></i><span class="d-none d-sm-inline">Mon espace</span></a>
    <a href="messagerie.html" class="btn-nav"><i class="bi bi-chat-text"></i><span class="d-none d-sm-inline">Messages</span></a>
    <a href="#" class="btn-nav btn-logout" onclick="AUTH.logout();return false;"><i class="bi bi-box-arrow-right"></i></a>
  </div>

  <!-- HERO PROFIL -->
  <div class="profile-hero">
    <div class="container">
      <div class="d-flex align-items-center gap-4 flex-wrap">
        <div id="avatar-wrap">
          <div class="avatar-placeholder"><i class="bi bi-person-fill"></i></div>
        </div>
        <div>
          <h1 class="fw-black mb-0 fs-3" id="hdr-nom">—</h1>
          <p class="mb-0 mt-1 opacity-80" id="hdr-role"></p>
          <p class="mb-0 small opacity-65" id="hdr-lieu"></p>
        </div>
        <div class="ms-auto d-flex gap-2 flex-wrap">
          <span class="badge bg-warning text-dark fw-bold px-3 py-2 fs-6" id="hdr-role-badge"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="profile-tabs">
    <button class="ptab active" onclick="switchTab('infos',this)"><i class="bi bi-person me-1"></i>Mes informations</button>
    <button class="ptab" onclick="switchTab('delegue',this)"><i class="bi bi-person-badge me-1"></i>Mon délégué</button>
    <button class="ptab" onclick="switchTab('famille',this)"><i class="bi bi-people me-1"></i>Ma famille</button>
    <button class="ptab" onclick="switchTab('historique',this)"><i class="bi bi-calendar-check me-1"></i>Mes participations</button>
    <button class="ptab" onclick="switchTab('messages',this)"><i class="bi bi-chat-text me-1"></i>Messagerie
      <span id="msg-unread-badge" class="badge bg-danger ms-1 d-none" style="font-size:.65rem;"></span>
    </button>
    <button class="ptab" onclick="switchTab('paiements',this)"><i class="bi bi-credit-card me-1"></i>Paiements</button>
    <button class="ptab" onclick="switchTab('securite',this)"><i class="bi bi-shield-lock me-1"></i>Sécurité</button>
  </div>

  <!-- CONTENT -->
  <div class="profile-content" id="profile-content">
    <div class="text-center text-muted py-5"><i class="bi bi-hourglass-split me-2"></i>Chargement…</div>
  </div>

  <!-- MODAL MESSAGE -->
  <div class="modal fade" id="msgModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4">
        <div class="modal-header" style="background:var(--cp);color:white;">
          <h5 class="modal-title fw-bold">Nouveau message</h5>
          <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="mb-3">
            <label class="form-label fw-semibold">Destinataire(s) <span class="text-danger">*</span></label>
            <div id="selected-recipients" class="mb-2 d-flex flex-wrap gap-1"></div>
            <div class="d-flex gap-2 mb-2">
              <input type="text" class="form-control" id="recipient-search" placeholder="Rechercher un membre…" oninput="filterRecipients()" />
              <button class="btn btn-sm btn-attt" onclick="selectAllRecipients()"><i class="bi bi-people me-1"></i>Tous</button>
            </div>
            <div id="recipients-list" style="max-height:200px;overflow-y:auto;border:1px solid #dee2e6;border-radius:10px;padding:.5rem;"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Objet <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="msg-subject" placeholder="Objet du message" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Message <span class="text-danger">*</span></label>
            <textarea class="form-control" id="msg-body" rows="5" placeholder="Votre message…"></textarea>
          </div>
          <div id="msg-alert" class="alert d-none mb-0"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-attt" onclick="sendMessage()"><i class="bi bi-send me-1"></i>Envoyer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/messaging.js"></script>
  <script src="js/payments.js"></script>
  <script src="js/events.js"></script>
  <script>
'use strict';
const user = AUTH.requireAuth('famille');
if (!user) throw new Error('Non authentifié');
if (!AUTH.hasPermission('Accéder page Profil', user, null, 'action')) {
  alert('Accès refusé à la page Profil.');
  history.back();
  throw new Error('Permission refusée');
}

let _currentTab = 'infos';
let _allUsers = [];
let _selectedRecipients = [];

/* ═══════ INIT ═══════ */
DB_READY.then(() => {
  // Header
  document.getElementById('hdr-nom').textContent  = (user.prenom||'') + ' ' + (user.nom||'');
  const ROLE_LBL = { famille:'Membre', membre:'Membre', delegue:'Délégué', direction:'Direction', admin:'Administrateur' };
  document.getElementById('hdr-role').textContent = user.email || '';
  document.getElementById('hdr-lieu').textContent = user.lieuTravail || '';
  document.getElementById('hdr-role-badge').textContent = ROLE_LBL[user.role] || user.role;

  // Load all users for messaging
  try {
    if (AUTH.getUsers) _allUsers = AUTH.getUsers().filter(u => u.id !== user.id && u.role !== 'famille' && u.statut === 'actif');
    else if (AUTH.getAllUsers) _allUsers = AUTH.getAllUsers().filter(u => u.id !== user.id);
  } catch(e){}

  // Unread badge
  try {
    if (typeof MESSAGING !== 'undefined' && MESSAGING.getUnread) {
      const u = MESSAGING.getUnread(user.id);
      if (u.length) {
        const b = document.getElementById('msg-unread-badge');
        if (b) { b.textContent = u.length; b.classList.remove('d-none'); }
      }
    }
  } catch(e){}

  renderTab('infos');
});

/* ═══════ TAB SWITCH ═══════ */
function switchTab(tab, btn) {
  _currentTab = tab;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  const content = document.getElementById('profile-content');
  content.innerHTML = '<div class="text-center text-muted py-5"><i class="bi bi-hourglass-split me-2"></i>Chargement…</div>';
  setTimeout(() => {
    try {
      switch(tab) {
        case 'infos':      renderInfos(content); break;
        case 'delegue':    renderDelegue(content); break;
        case 'famille':    renderFamille(content); break;
        case 'historique': renderHistorique(content); break;
        case 'messages':   renderMessages(content); break;
        case 'paiements':  renderPaiements(content); break;
        case 'securite':   renderSecurite(content); break;
        default: content.innerHTML = '<p class="text-muted">Section indisponible.</p>';
      }
    } catch(e) {
      content.innerHTML = `<div class="alert alert-warning">Erreur : ${e.message}</div>`;
    }
  }, 80);
}

/* ═══════ INFOS ═══════ */
function renderInfos(c) {
  const cities = (typeof PROFILE !== 'undefined' && PROFILE.VILLES_TN) ? PROFILE.VILLES_TN : [];
  const cityOptions = cities.map(v => `<option value="${v}" ${user.lieuTravail===v?'selected':''}>${v}</option>`).join('');
  c.innerHTML = `
    <div class="tab-pane-anim">
      <div class="info-card">
        <h3><i class="bi bi-person-lines-fill me-2 text-primary"></i>Informations personnelles</h3>
        <div id="info-alert" class="alert d-none mb-3"></div>
        <div class="row g-3">
          <div class="col-sm-6"><label class="form-label fw-semibold small">Nom</label>
            <input class="form-control" id="f-nom" value="${AUTH.esc(user.nom||'')}" /></div>
          <div class="col-sm-6"><label class="form-label fw-semibold small">Prénom</label>
            <input class="form-control" id="f-prenom" value="${AUTH.esc(user.prenom||'')}" /></div>
          <div class="col-sm-6"><label class="form-label fw-semibold small">Login (non modifiable)</label>
            <input class="form-control" value="${AUTH.esc(user.login||'')}" readonly style="background:#f8f9fa;" /></div>
          <div class="col-sm-6"><label class="form-label fw-semibold small">E-mail</label>
            <input class="form-control" id="f-email" type="email" value="${AUTH.esc(user.email||'')}" /></div>
          <div class="col-sm-6"><label class="form-label fw-semibold small">Téléphone</label>
            <input class="form-control" id="f-telephone" type="tel" value="${AUTH.esc(user.telephone||'')}" /></div>
          <div class="col-sm-6"><label class="form-label fw-semibold small">Date de naissance</label>
            <input class="form-control" id="f-date" type="date" value="${AUTH.esc(user.dateNaissance||'')}" /></div>
          <div class="col-sm-6"><label class="form-label fw-semibold small">Lieu de travail</label>
            <select class="form-select" id="f-lieu"><option value="">— Choisir —</option>${cityOptions}</select></div>
          <div class="col-12"><label class="form-label fw-semibold small">Adresse</label>
            <textarea class="form-control" id="f-adresse" rows="2">${AUTH.esc(user.adresse||'')}</textarea></div>
        </div>
        <button class="btn btn-attt mt-4" onclick="saveInfos()"><i class="bi bi-check-circle me-1"></i>Enregistrer</button>
      </div>
    </div>`;
}

function saveInfos() {
  const data = {
    nom: document.getElementById('f-nom').value.trim(),
    prenom: document.getElementById('f-prenom').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    telephone: document.getElementById('f-telephone').value.trim(),
    dateNaissance: document.getElementById('f-date').value,
    lieuTravail: document.getElementById('f-lieu').value,
    adresse: document.getElementById('f-adresse').value.trim(),
  };
  try {
    const result = PROFILE.updateProfile ? PROFILE.updateProfile(user.id, data) : AUTH.updateUser(user.id, data);
    const al = document.getElementById('info-alert');
    if (result && result.ok === false) {
      al.className = 'alert alert-danger'; al.textContent = result.msg || 'Erreur.';
    } else {
      al.className = 'alert alert-success'; al.textContent = '✓ Informations enregistrées.';
      Object.assign(user, data);
    }
    al.classList.remove('d-none');
  } catch(e) { alert('Erreur : ' + e.message); }
}

/* ═══════ DÉLÉGUÉ ═══════ */
function renderDelegue(c) {
  let delegue = null;
  try {
    if (user.delegueId && AUTH.getUserById) delegue = AUTH.getUserById(user.delegueId);
    else if (AUTH.getUsers) {
      const all = AUTH.getUsers();
      delegue = all.find(u => u.role === 'delegue' && (u.membres||[]).includes(user.id));
    }
  } catch(e){}

  if (!delegue) {
    c.innerHTML = `<div class="tab-pane-anim">
      <div class="info-card">
        <h3><i class="bi bi-person-badge me-2 text-primary"></i>Mon délégué</h3>
        <div class="text-center text-muted py-4">
          <i class="bi bi-person-dash fs-2 d-block mb-2 opacity-25"></i>
          Aucun délégué n'est attaché à votre compte pour le moment.<br>
          <small>Un délégué vous sera assigné après validation de votre inscription.</small>
        </div>
      </div>
    </div>`;
    return;
  }

  c.innerHTML = `<div class="tab-pane-anim">
    <div class="info-card">
      <h3><i class="bi bi-person-badge me-2 text-primary"></i>Mon délégué</h3>
      <div class="delegue-card d-flex align-items-center gap-3 flex-wrap">
        <div style="width:64px;height:64px;border-radius:50%;background:var(--cp);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;flex-shrink:0;">
          ${(delegue.prenom||'?').charAt(0).toUpperCase()}
        </div>
        <div class="flex-grow-1">
          <div class="fw-bold fs-5">${AUTH.esc(delegue.prenom||'')} ${AUTH.esc(delegue.nom||'')}</div>
          <div class="text-muted small"><i class="bi bi-person-badge me-1"></i>Délégué de l'Amicale</div>
          ${delegue.lieuTravail ? `<div class="text-muted small"><i class="bi bi-geo-alt me-1"></i>${AUTH.esc(delegue.lieuTravail)}</div>` : ''}
          ${delegue.telephone ? `<div class="text-muted small"><i class="bi bi-telephone me-1"></i>${AUTH.esc(delegue.telephone)}</div>` : ''}
          ${delegue.email ? `<div class="text-muted small"><i class="bi bi-envelope me-1"></i>${AUTH.esc(delegue.email)}</div>` : ''}
        </div>
        <button class="btn btn-attt btn-sm" onclick="openMsgModal(['${delegue.id}'])">
          <i class="bi bi-chat-text me-1"></i>Contacter
        </button>
      </div>
      <div class="mt-4">
        <h4 class="h6 fw-bold mb-2"><i class="bi bi-people me-1"></i>Membres de ce délégué</h4>
        <div id="delegue-membres-list" class="text-muted small">Chargement…</div>
      </div>
    </div>
  </div>`;

  // Members list
  try {
    if (AUTH.getUsers) {
      const membres = AUTH.getUsers().filter(u => (u.delegueId === delegue.id) || ((delegue.membres||[]).includes(u.id)));
      const listEl = document.getElementById('delegue-membres-list');
      if (!membres.length) { listEl.textContent = 'Aucun membre listé.'; }
      else {
        listEl.innerHTML = membres.slice(0,10).map(m =>
          `<span class="badge bg-light text-dark me-1 mb-1 border">${AUTH.esc(m.prenom||'')} ${AUTH.esc(m.nom||'')}</span>`
        ).join('') + (membres.length > 10 ? `<span class="text-muted">… +${membres.length-10} autres</span>` : '');
      }
    }
  } catch(e){}
}

/* ═══════ FAMILLE ═══════ */
function renderFamille(c) {
  let members = [];
  try {
    if (AUTH.getUsers) {
      const all = AUTH.getUsers();
      // Membres famille liés à cet utilisateur via linkedTo (rôle Famille)
      const byLinkedTo = all.filter(u => u.linkedTo === user.id && u.id !== user.id && AUTH.hasRole(u, 'famille'));
      // Membres partageant le même familyCode (ancienne méthode)
      const byFamilyCode = user.familyCode
        ? all.filter(u => u.familyCode === user.familyCode && u.id !== user.id)
        : [];
      // Fusion sans doublons
      const seen = new Set();
      members = [...byLinkedTo, ...byFamilyCode].filter(u => { if (seen.has(u.id)) return false; seen.add(u.id); return true; });
    }
  } catch(e){}

  let html = `<div class="tab-pane-anim">
    <div class="info-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0"><i class="bi bi-people me-2 text-primary"></i>Membres de ma famille</h3>
      </div>`;

  if (!members.length) {
    html += `<p class="text-muted">Aucun membre famille lié à votre compte.</p>`;
  } else {
    html += members.map(m => `
      <div class="fam-item">
        <div class="fam-avatar">${(m.prenom||'?').charAt(0).toUpperCase()}</div>
        <div class="flex-grow-1">
          <div class="fw-bold">${AUTH.esc(m.prenom||'')} ${AUTH.esc(m.nom||'')}</div>
          <div class="small text-muted">${AUTH.esc(m.email||'')} · Statut : ${AUTH.esc(m.statut||'—')}</div>
        </div>
        <span class="badge ${m.statut==='actif'?'bg-success':'bg-warning text-dark'}">${m.statut==='actif'?'Actif':'En attente'}</span>
      </div>`).join('');
  }

  // Code famille
  const code = user.familyCode || user.familyShareCode || '—';
  html += `
    </div>
    <div class="info-card">
      <h3><i class="bi bi-share me-2 text-primary"></i>Code de partage famille</h3>
      <p class="text-muted small mb-3">Partagez ce code avec vos proches pour qu'ils puissent créer un compte famille lié au vôtre.</p>
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <code class="fs-5 fw-bold px-3 py-2 bg-light rounded-3 border">${code}</code>
        <button class="btn btn-oa btn-sm" onclick="navigator.clipboard.writeText('${code}').then(()=>alert('Code copié !'))">
          <i class="bi bi-clipboard me-1"></i>Copier
        </button>
        <a href="inscription.html?familyCode=${code}" class="btn btn-attt btn-sm">
          <i class="bi bi-person-plus me-1"></i>Lien d'inscription
        </a>
      </div>
    </div>
  </div>`;
  c.innerHTML = html;
}

/* ═══════ HISTORIQUE ═══════ */
function renderHistorique(c) {
  let registrations = [];
  try {
    if (typeof EVENTS !== 'undefined' && EVENTS.getRegistrations) registrations = EVENTS.getRegistrations(user.id);
    else if (user.participations) registrations = user.participations;
  } catch(e){}

  const ICONS = { events:'calendar-event', voyages:'compass', locations:'house-heart', offres:'tag', conventions:'award', votes:'ballot' };
  const COLORS = { events:'#003DA6', voyages:'#2e7d32', locations:'#d84315', offres:'#f59e0b', conventions:'#7b1fa2', votes:'#0dcaf0' };

  let html = `<div class="tab-pane-anim">
    <div class="info-card">
      <h3><i class="bi bi-calendar-check me-2 text-primary"></i>Mes participations</h3>`;

  if (!registrations.length) {
    html += `<div class="text-center text-muted py-4">
      <i class="bi bi-inbox fs-2 d-block mb-2 opacity-25"></i>Aucune participation enregistrée.
    </div>`;
  } else {
    html += registrations.slice(0,20).map(r => {
      const type = r.type || 'events';
      const icon = ICONS[type] || 'calendar';
      const color = COLORS[type] || '#003DA6';
      return `<div class="hist-item">
        <div class="hist-icon" style="background:${color}20;color:${color};"><i class="bi bi-${icon}"></i></div>
        <div class="flex-grow-1">
          <div class="fw-bold">${AUTH.esc(r.titre||r.eventId||'Activité')}</div>
          <div class="small text-muted">${AUTH.esc(r.date||r.dateInscription||'—')} · ${AUTH.esc(r.lieu||r.type||'—')}</div>
          ${r.statut ? `<span class="badge ${r.statut==='confirmé'?'bg-success':'bg-warning text-dark'} mt-1" style="font-size:.72rem;">${r.statut}</span>` : ''}
        </div>
        ${r.montant ? `<div class="text-end flex-shrink-0"><div class="fw-bold">${r.montant} TND</div></div>` : ''}
      </div>`;
    }).join('');
  }
  html += '</div></div>';
  c.innerHTML = html;
}

/* ═══════ MESSAGERIE ═══════ */
function renderMessages(c) {
  let inbox = [], sent = [];
  try {
    if (typeof MESSAGING !== 'undefined') {
      if (MESSAGING.getInbox) inbox = MESSAGING.getInbox(user.id);
      if (MESSAGING.getSent)  sent  = MESSAGING.getSent(user.id);
    }
  } catch(e){}

  c.innerHTML = `<div class="tab-pane-anim">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h2 class="h5 fw-bold mb-0"><i class="bi bi-chat-text me-2 text-primary"></i>Messagerie</h2>
      <button class="btn btn-attt btn-sm" onclick="openMsgModal([])">
        <i class="bi bi-pencil-square me-1"></i>Nouveau message
      </button>
    </div>

    <!-- Nav inbox/envoyés -->
    <ul class="nav nav-pills mb-3 gap-2">
      <li class="nav-item"><button class="btn btn-sm active" id="btn-inbox" onclick="showMsgSection('inbox')" style="background:var(--cp);color:#fff;border-radius:9px;padding:.4rem 1rem;border:none;font-weight:600;">
        <i class="bi bi-inbox me-1"></i>Reçus (${inbox.length})</button></li>
      <li class="nav-item"><button class="btn btn-sm" id="btn-sent" onclick="showMsgSection('sent')" style="background:#e9ecef;color:#495057;border-radius:9px;padding:.4rem 1rem;border:none;font-weight:600;">
        <i class="bi bi-send me-1"></i>Envoyés (${sent.length})</button></li>
    </ul>

    <div id="msg-inbox">
      ${!inbox.length ? '<p class="text-muted text-center py-3">Aucun message reçu.</p>' :
        inbox.map(m => `<div class="msg-item ${m.lu?'':'unread'}" onclick="openMsg('${m.id}')">
          <div class="d-flex justify-content-between align-items-start">
            <div class="msg-from"><i class="bi bi-person-circle me-1 text-primary"></i>${AUTH.esc(m.expediteurNom||m.expediteurId||'Inconnu')}</div>
            <div class="msg-date">${AUTH.esc(m.date||'')}</div>
          </div>
          <div class="msg-sub">${AUTH.esc(m.sujet||'(sans objet)')}</div>
          <div class="small text-muted mt-1">${AUTH.esc((m.corps||'').substring(0,80))}…</div>
        </div>`).join('')}
    </div>
    <div id="msg-sent" class="d-none">
      ${!sent.length ? '<p class="text-muted text-center py-3">Aucun message envoyé.</p>' :
        sent.map(m => `<div class="msg-item" onclick="openMsg('${m.id}')">
          <div class="d-flex justify-content-between align-items-start">
            <div class="msg-from"><i class="bi bi-send me-1 text-success"></i>À : ${AUTH.esc((m.destinataires||[]).join(', '))}</div>
            <div class="msg-date">${AUTH.esc(m.date||'')}</div>
          </div>
          <div class="msg-sub">${AUTH.esc(m.sujet||'(sans objet)')}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function showMsgSection(sec) {
  document.getElementById('msg-inbox').classList.toggle('d-none', sec !== 'inbox');
  document.getElementById('msg-sent').classList.toggle('d-none', sec !== 'sent');
  document.getElementById('btn-inbox').style.background = sec==='inbox' ? 'var(--cp)' : '#e9ecef';
  document.getElementById('btn-inbox').style.color = sec==='inbox' ? '#fff' : '#495057';
  document.getElementById('btn-sent').style.background = sec==='sent' ? 'var(--cp)' : '#e9ecef';
  document.getElementById('btn-sent').style.color = sec==='sent' ? '#fff' : '#495057';
}

function openMsg(msgId) {
  try {
    let msg = null;
    if (typeof MESSAGING !== 'undefined' && MESSAGING.getMessage) msg = MESSAGING.getMessage(msgId);
    if (!msg) return;
    if (MESSAGING.markRead) MESSAGING.markRead(msgId);
    alert(`De : ${msg.expediteurNom||msg.expediteurId||'—'}\nObjet : ${msg.sujet}\n\n${msg.corps}`);
  } catch(e) { alert('Impossible d\'ouvrir le message.'); }
}

/* ═══════ PAIEMENTS ═══════ */
function renderPaiements(c) {
  let payments = [];
  try {
    if (typeof PAYMENTS !== 'undefined' && PAYMENTS.getUserPayments) payments = PAYMENTS.getUserPayments(user.id);
    else if (user.paiements) payments = user.paiements;
  } catch(e){}

  c.innerHTML = `<div class="tab-pane-anim">
    <div class="info-card">
      <h3><i class="bi bi-credit-card me-2 text-primary"></i>Suivi des paiements</h3>
      ${!payments.length
        ? '<p class="text-muted text-center py-3">Aucun paiement enregistré.</p>'
        : `<div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr><th>Date</th><th>Description</th><th>Montant</th><th>Statut</th></tr>
              </thead>
              <tbody>${payments.map(p => `
                <tr>
                  <td class="small">${AUTH.esc(p.date||'—')}</td>
                  <td>${AUTH.esc(p.description||p.type||'—')}</td>
                  <td class="fw-bold">${p.montant||'—'} TND</td>
                  <td><span class="badge ${p.statut==='payé'?'bg-success':p.statut==='en attente'?'bg-warning text-dark':'bg-secondary'}">${AUTH.esc(p.statut||'—')}</span></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>`}
    </div>
  </div>`;
}

/* ═══════ SECURITE ═══════ */
function renderSecurite(c) {
  c.innerHTML = `<div class="tab-pane-anim">
    <div class="info-card">
      <h3><i class="bi bi-shield-lock me-2 text-primary"></i>Changer le mot de passe</h3>
      <div id="pwd-alert" class="alert d-none mb-3"></div>
      <div class="row g-3" style="max-width:450px;">
        <div class="col-12"><label class="form-label fw-semibold small">Mot de passe actuel</label>
          <input type="password" class="form-control" id="old-pwd" /></div>
        <div class="col-12"><label class="form-label fw-semibold small">Nouveau mot de passe</label>
          <input type="password" class="form-control" id="new-pwd" /></div>
        <div class="col-12"><label class="form-label fw-semibold small">Confirmer le nouveau</label>
          <input type="password" class="form-control" id="new-pwd2" /></div>
      </div>
      <button class="btn btn-attt mt-4" onclick="changePwd()"><i class="bi bi-lock me-1"></i>Changer le mot de passe</button>
    </div>
  </div>`;
}

function changePwd() {
  const old = document.getElementById('old-pwd').value;
  const np  = document.getElementById('new-pwd').value;
  const np2 = document.getElementById('new-pwd2').value;
  const al  = document.getElementById('pwd-alert');
  const show = (t,m) => { al.className='alert alert-'+t; al.textContent=m; al.classList.remove('d-none'); };
  if (!old||!np||!np2) return show('warning','Veuillez remplir tous les champs.');
  if (np !== np2) return show('danger','Les mots de passe ne correspondent pas.');
  if (np.length < 6) return show('warning','Le mot de passe doit contenir au moins 6 caractères.');
  try {
    const result = AUTH.changePassword ? AUTH.changePassword(user.id, old, np) : { ok:false, msg:'Non disponible.' };
    if (result.ok) show('success','✓ Mot de passe modifié.');
    else show('danger', result.msg || 'Erreur.');
  } catch(e) { show('danger','Erreur : ' + e.message); }
}

/* ═══════ MESSAGERIE MODALE ═══════ */
function openMsgModal(preSelected) {
  _selectedRecipients = [...preSelected];
  renderRecipientBadges();
  filterRecipients();
  new bootstrap.Modal(document.getElementById('msgModal')).show();
}

function filterRecipients() {
  const q = (document.getElementById('recipient-search')?.value||'').toLowerCase();
  const list = document.getElementById('recipients-list');
  if (!list) return;
  const filtered = _allUsers.filter(u =>
    !_selectedRecipients.includes(u.id) &&
    ((u.prenom||'') + ' ' + (u.nom||'')).toLowerCase().includes(q)
  );
  list.innerHTML = filtered.slice(0,30).map(u => `
    <div class="user-select-item" onclick="toggleRecipient('${u.id}','${AUTH.esc(u.prenom||'')} ${AUTH.esc(u.nom||'')}')">
      <div class="u-avatar">${(u.prenom||'?').charAt(0).toUpperCase()}</div>
      <div>
        <div class="fw-semibold small">${AUTH.esc(u.prenom||'')} ${AUTH.esc(u.nom||'')}</div>
        <div class="small text-muted">${AUTH.esc(u.role||'')} · ${AUTH.esc(u.lieuTravail||'')}</div>
      </div>
    </div>`).join('') || '<p class="text-muted text-center small py-2">Aucun résultat.</p>';
}

function toggleRecipient(id, name) {
  if (!_selectedRecipients.includes(id)) _selectedRecipients.push(id);
  renderRecipientBadges();
  filterRecipients();
}

function removeRecipient(id) {
  _selectedRecipients = _selectedRecipients.filter(r => r !== id);
  renderRecipientBadges();
  filterRecipients();
}

function renderRecipientBadges() {
  const container = document.getElementById('selected-recipients');
  if (!container) return;
  container.innerHTML = _selectedRecipients.map(id => {
    const u = _allUsers.find(u => u.id === id);
    const name = u ? `${u.prenom||''} ${u.nom||''}` : id;
    return `<span class="selected-user">
      <i class="bi bi-person-fill" style="font-size:.75rem;color:var(--cp);"></i>${AUTH.esc(name)}
      <i class="bi bi-x" style="cursor:pointer;font-size:.8rem;" onclick="removeRecipient('${id}')"></i>
    </span>`;
  }).join('');
}

function selectAllRecipients() {
  _selectedRecipients = _allUsers.map(u => u.id);
  renderRecipientBadges();
  filterRecipients();
}

function sendMessage() {
  const sujet = document.getElementById('msg-subject').value.trim();
  const corps = document.getElementById('msg-body').value.trim();
  const al    = document.getElementById('msg-alert');
  const show  = (t,m) => { al.className='alert alert-'+t; al.textContent=m; al.classList.remove('d-none'); };
  if (!_selectedRecipients.length) return show('warning','Veuillez sélectionner au moins un destinataire.');
  if (!sujet) return show('warning','Veuillez saisir un objet.');
  if (!corps) return show('warning','Veuillez saisir un message.');
  try {
    const result = typeof MESSAGING !== 'undefined' && MESSAGING.send
      ? MESSAGING.send(user.id, _selectedRecipients, sujet, corps)
      : { ok:false, msg:'Messagerie non disponible.' };
    if (result && result.ok) {
      show('success', '✓ Message envoyé à ' + _selectedRecipients.length + ' destinataire(s).');
      document.getElementById('msg-subject').value = '';
      document.getElementById('msg-body').value = '';
      _selectedRecipients = [];
      renderRecipientBadges();
      setTimeout(() => bootstrap.Modal.getInstance(document.getElementById('msgModal')).hide(), 1200);
    } else { show('danger', (result && result.msg) || 'Erreur lors de l\'envoi.'); }
  } catch(e) { show('danger','Erreur : ' + e.message); }
}
  </script>
