<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amicale ATTT — Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg, #003DA6 0%, #0056cc 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 420px; width: 100%; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="mx-auto login-card">

    <!-- Logo & titre -->
    <div class="text-center text-white mb-4">
      <i class="bi bi-people-fill" style="font-size:3rem;"></i>
      <h1 class="h4 fw-bold mt-2">Amicale de l'ATTT</h1>
      <p class="opacity-75 small">Espace membres</p>
    </div>

    <div class="card shadow-lg border-0 rounded-4 p-4">
      <h2 class="h5 fw-bold mb-4 text-center" style="color:var(--couleur-principale);">
        <i class="bi bi-person-lock me-2"></i>Connexion
      </h2>

      <div id="alert-box" class="alert d-none" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="login" class="form-label fw-semibold">Login <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="login" name="login"
                   placeholder="Votre identifiant" required autocomplete="username" />
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Mot de passe <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Votre mot de passe" required autocomplete="current-password" />
            <button class="btn btn-outline-secondary" type="button" id="toggle-pwd" tabindex="-1"
                    aria-label="Afficher/masquer le mot de passe">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-attt w-100 btn-lg" id="submit-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
      </form>

      <hr class="my-4" />
      <p class="text-center text-muted small mb-0">
        Pas encore membre ?
        <a href="inscription.html" class="fw-semibold">Créer un compte</a>
      </p>
      <p class="text-center mt-2 mb-0">
        <a href="index.html" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Retour au site
        </a>
      </p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Firebase SDK (Base de données Cloud) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>
  /* Redirige si déjà connecté */
  document.addEventListener('DOMContentLoaded', () => {
    const user = AUTH.getCurrentUser();
    if (user) window.location.href = AUTH.dashUrl(user.role);
  });

  /* Afficher/masquer mot de passe */
  document.getElementById('toggle-pwd').addEventListener('click', () => {
    const inp = document.getElementById('password');
    const ico = document.querySelector('#toggle-pwd i');
    if (inp.type === 'password') { inp.type = 'text';  ico.className = 'bi bi-eye-slash'; }
    else                         { inp.type = 'password'; ico.className = 'bi bi-eye'; }
  });

  /* Soumission */
  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const alert = document.getElementById('alert-box');
    const btn   = document.getElementById('submit-btn');

    const loginVal = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;

    if (!loginVal || !password) {
      alert.className = 'alert alert-warning';
      alert.textContent = 'Veuillez remplir tous les champs.';
      alert.classList.remove('d-none');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connexion…';

    setTimeout(() => {
      const result = AUTH.login(loginVal, password);
      if (result.ok) {
        const dest = AUTH.dashUrl(result.user.role);
        window.location.href = dest;
      } else {
        alert.className = 'alert alert-danger';
        alert.textContent = result.msg;
        alert.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Se connecter';
      }
    }, 400);
  });
</script>
</body>
</html>
