<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amicale ATTT — Conventions</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003DA6" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <style>
    .conv-card { border:none; box-shadow:0 2px 12px rgba(0,0,0,.07); transition:transform .2s,box-shadow .2s; cursor:pointer; }
    .conv-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,61,166,.13); }
    .conv-badge { font-size:.73rem; }
    .conv-img   { width:100%; height:130px; object-fit:cover; border-radius:10px 10px 0 0; }
    .conv-img-ph { width:100%; height:130px; display:flex; align-items:center; justify-content:center; border-radius:10px 10px 0 0; background:#f0f4ff; }
    .expiry-ok  { color:#198754; }
    .expiry-exp { color:#dc3545; }
    .filter-bar { background:#f8f9fa; border-radius:12px; padding:1rem; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-people-fill fs-4"></i>Amicale ATTT
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link active" href="conventions.html">Conventions</a></li>
          <li class="nav-item"><a class="nav-link" href="evenements.html">Événements</a></li>
          <li class="nav-item"><a class="nav-link" href="espace-membre.html">Mon espace</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero-section py-5" style="background:linear-gradient(135deg,var(--couleur-principale),#0056cc);">
    <div class="container text-white text-center py-2">
      <h1 class="fw-bold mb-2"><i class="bi bi-award me-2"></i>Conventions & Avantages</h1>
      <p class="lead opacity-85 mb-0">Découvrez les partenariats et avantages réservés aux membres de l'Amicale ATTT</p>
    </div>
  </div>

  <main class="py-5">
    <div class="container">

      <!-- BARRE DE FILTRES -->
      <div class="filter-bar mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label small fw-semibold mb-1">Rechercher</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control" id="f-search" placeholder="Titre, partenaire…" oninput="renderConventions()" />
            </div>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold mb-1">Catégorie</label>
            <select class="form-select" id="f-cat" onchange="renderConventions()">
              <option value="">Toutes</option>
            </select>
          </div>
          <div class="col-md-2">
            <div class="form-check form-switch mt-3">
              <input class="form-check-input" type="checkbox" id="f-en-cours" checked onchange="renderConventions()" />
              <label class="form-check-label small" for="f-en-cours">En cours uniquement</label>
            </div>
          </div>
          <div class="col-md-3 text-md-end">
            <span class="badge bg-primary rounded-pill fs-6" id="conv-count">0 convention(s)</span>
          </div>
        </div>
      </div>

      <!-- GRID DES CONVENTIONS -->
      <div class="row g-4" id="conv-grid"></div>

      <!-- ÉTAT VIDE -->
      <div id="conv-empty" class="text-center py-5 d-none">
        <i class="bi bi-inbox text-muted fs-1 d-block mb-2"></i>
        <p class="text-muted">Aucune convention ne correspond à vos filtres.</p>
      </div>

    </div>
  </main>

  <!-- MODAL DÉTAIL CONVENTION -->
  <div class="modal fade" id="modalConvention" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="mconv-titre">—</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="mconv-body"></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="py-3 text-white text-center small">
    <div class="container"><p class="mb-0 opacity-75">&copy; 2026 Amicale ATTT — Conventions</p></div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/conventions.js"></script>
<script>
'use strict';

/* Populate catégories */
DB_READY.then(() => {
  const sel = document.getElementById('f-cat');
  Object.entries(CONVENTIONS.CAT_LABELS).forEach(([k,v]) => {
    const o = document.createElement('option'); o.value=k; o.textContent=v; sel.appendChild(o);
  });
  renderConventions();
});

function renderConventions() {
  const q       = document.getElementById('f-search').value.trim();
  const cat     = document.getElementById('f-cat').value;
  const enCours = document.getElementById('f-en-cours').checked;

  /* ⚠ Filtrage par accès : famille (role 0) peut voir 'tous' + 'famille'; visiteur anonyme → 'tous' seulement */
  const user  = AUTH.getCurrentUser ? AUTH.getCurrentUser() : null;
  const role  = user ? (user.role || 0) : -1;

  const items = CONVENTIONS.getConventions({ q, categorie: cat||undefined, enCours: enCours||undefined });
  const visibles = items.filter(c => {
    if (c.acces === 'tous')     return true;
    if (role < 0)               return false;   /* non connecté */
    if (c.acces === 'famille')  return role >= 0;
    if (c.acces === 'membres')  return role >= 1;
    return false;
  });

  const grid  = document.getElementById('conv-grid');
  const empty = document.getElementById('conv-empty');
  document.getElementById('conv-count').textContent = visibles.length + ' convention(s)';

  if (!visibles.length) {
    grid.innerHTML = '';
    empty.classList.remove('d-none');
    return;
  }
  empty.classList.add('d-none');

  const today = new Date().toISOString().slice(0,10);

  grid.innerHTML = visibles.map(c => {
    const catColor = CONVENTIONS.CAT_COLORS[c.categorie] || 'secondary';
    const catLabel = CONVENTIONS.CAT_LABELS[c.categorie] || c.categorie;
    const accesL   = CONVENTIONS.ACCES_LABELS[c.acces]   || c.acces;
    const expired  = c.dateFin && c.dateFin < today;

    return `
    <div class="col-md-6 col-lg-4">
      <div class="card conv-card h-100" onclick="showConvention('${c.id}')">
        ${c.photo
          ? `<img src="${c.photo}" class="conv-img" alt="${AUTH.esc(c.titre)}" />`
          : `<div class="conv-img-ph"><i class="bi bi-${catIcon(c.categorie)} fs-1 text-primary opacity-25"></i></div>`}
        <div class="card-body pb-2">
          <div class="d-flex gap-1 flex-wrap mb-2">
            <span class="badge bg-${catColor} conv-badge">${catLabel}</span>
            <span class="badge bg-light text-dark border conv-badge">${accesL}</span>
            ${expired ? '<span class="badge bg-danger conv-badge">Expirée</span>' : '<span class="badge bg-success conv-badge">Active</span>'}
          </div>
          <h5 class="card-title h6 fw-bold mb-1">${AUTH.esc(c.titre)}</h5>
          ${c.partenaire ? `<p class="text-muted small mb-1"><i class="bi bi-building me-1"></i>${AUTH.esc(c.partenaire)}</p>` : ''}
          <p class="small text-secondary mb-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${AUTH.esc(c.description||'')}</p>
        </div>
        <div class="card-footer bg-transparent border-0 pt-0 pb-3 px-3 small text-muted d-flex justify-content-between">
          <span><i class="bi bi-calendar-range me-1"></i>${AUTH.esc(c.dateDebut||'?')} → ${AUTH.esc(c.dateFin||'?')}</span>
          <span class="${expired?'expiry-exp':'expiry-ok'}"><i class="bi bi-arrow-right-circle me-1"></i>Voir</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function catIcon(cat) {
  const icons = { reduction:'tag', loisir:'controller', sante:'heart-pulse', logement:'house', autre:'patch-check' };
  return icons[cat] || 'patch-check';
}

function showConvention(id) {
  const c = CONVENTIONS.getConvention(id);
  if (!c) return;
  const catColor = CONVENTIONS.CAT_COLORS[c.categorie] || 'secondary';
  const catLabel = CONVENTIONS.CAT_LABELS[c.categorie] || c.categorie;
  const accesL   = CONVENTIONS.ACCES_LABELS[c.acces]   || c.acces;
  const today    = new Date().toISOString().slice(0,10);
  const expired  = c.dateFin && c.dateFin < today;

  document.getElementById('mconv-titre').textContent = c.titre;
  document.getElementById('mconv-body').innerHTML = `
    ${c.photo ? `<img src="${c.photo}" class="img-fluid rounded mb-3 w-100" style="max-height:220px;object-fit:cover;" alt="" />` : ''}
    <div class="d-flex gap-2 flex-wrap mb-3">
      <span class="badge bg-${catColor}">${catLabel}</span>
      <span class="badge bg-light text-dark border">${accesL}</span>
      ${expired ? '<span class="badge bg-danger">Expirée</span>' : '<span class="badge bg-success">Active</span>'}
    </div>
    ${c.partenaire ? `<p class="mb-1"><strong><i class="bi bi-building me-1"></i>Partenaire :</strong> ${AUTH.esc(c.partenaire)}</p>` : ''}
    <p class="mb-1"><strong><i class="bi bi-calendar-range me-1"></i>Période :</strong> ${AUTH.esc(c.dateDebut||'?')} au ${AUTH.esc(c.dateFin||'?')}</p>
    ${c.description ? `<p class="mt-3 mb-2">${AUTH.esc(c.description)}</p>` : ''}
    ${c.conditions   ? `<div class="alert alert-info p-2 small"><strong><i class="bi bi-info-circle me-1"></i>Conditions :</strong> ${AUTH.esc(c.conditions)}</div>` : ''}
    ${c.contact      ? `<p class="mb-0 small text-muted"><strong><i class="bi bi-telephone me-1"></i>Contact :</strong> ${AUTH.esc(c.contact)}</p>` : ''}
  `;

  new bootstrap.Modal(document.getElementById('modalConvention')).show();
}
</script>
</body>
</html>
