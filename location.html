<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amicale ATTT — Locations vacances</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#003DA6" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <style>
    .rental-card    { border:none; box-shadow:0 2px 12px rgba(0,0,0,.07); transition:transform .2s; }
    .rental-card:hover { transform:translateY(-3px); }
    .tranche-badge  { font-size:.8rem; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-people-fill fs-4"></i>Amicale ATTT
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="espace-membre.html">Mon espace</a></li>
          <li class="nav-item"><a class="nav-link active" href="location.html">Locations vacances</a></li>
          <li class="nav-item"><a class="nav-link" href="profil.html">Mon profil</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="py-5" style="background:linear-gradient(135deg,var(--couleur-principale),#0056cc);color:white;">
    <div class="container text-center py-2">
      <h1 class="fw-bold mb-2"><i class="bi bi-house-heart me-2"></i>Locations de vacances</h1>
      <p class="lead opacity-85 mb-0">Logements mis à disposition par l'Amicale ATTT pour les membres et leurs familles</p>
    </div>
  </div>

  <main class="py-5">
    <div class="container">
      <div class="row g-4" id="rentals-grid"></div>
      <div id="rentals-empty" class="text-center py-5 d-none">
        <i class="bi bi-house fs-1 text-muted d-block mb-2"></i>
        <p class="text-muted">Aucune location disponible pour le moment.</p>
      </div>
    </div>
  </main>

  <!-- MODAL RÉSERVATION -->
  <div class="modal fade" id="bookModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header" style="background:var(--couleur-principale);color:white;">
          <h5 class="modal-title fw-bold" id="bk-titre">Réserver</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="bk-alert" class="alert d-none mb-3"></div>
          <input type="hidden" id="bk-rental-id" />
          <input type="hidden" id="bk-tranche-id" />
          <div class="mb-3">
            <label class="form-label fw-semibold small">Tranche choisie</label>
            <div id="bk-tranche-desc" class="p-2 bg-light rounded"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small" id="bk-nb-label">Nombre d'unités</label>
            <input type="number" class="form-control" id="bk-nb" min="1" value="1" oninput="updateBookingTotal()" />
            <div class="form-text" id="bk-dispo-text"></div>
          </div>
          <div class="p-3 bg-light rounded text-center">
            <small class="text-muted d-block">Montant total estimé</small>
            <strong class="fs-4" id="bk-total">0 TND</strong>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
          <button class="btn btn-attt" data-perm="Réserver location vacances" data-perm-mode="action" onclick="confirmBook()"><i class="bi bi-check-circle me-1"></i>Confirmer la réservation</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="py-3 text-white text-center small">
    <div class="container"><p class="mb-0 opacity-75">&copy; 2026 Amicale ATTT — Locations</p></div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/payments.js"></script>
<script src="js/rentals.js"></script>
<script>
'use strict';

const user = AUTH.requireAuth('famille');
if (!user) throw new Error();

let _currentTranche = null;
let _currentRental  = null;

function canBookRental() {
  return AUTH.hasPermission('Réserver location vacances', user, null, 'action');
}

DB_READY.then(() => renderRentals());

function renderRentals() {
  const rentals = RENTALS.getRentals().filter(r => r.actif);
  const grid    = document.getElementById('rentals-grid');
  const empty   = document.getElementById('rentals-empty');
  if (!rentals.length) { grid.innerHTML=''; empty.classList.remove('d-none'); return; }
  empty.classList.add('d-none');

  grid.innerHTML = rentals.map(r => {
    const trancheCards = (r.tranches||[]).map(t => {
      const dispo = RENTALS.getAvailableUnits(r.id, t.id);
      return `<div class="border rounded-3 p-3 mb-2">
        <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
          <div>
            <div class="fw-semibold">${AUTH.esc(t.libelle)}</div>
            <small class="text-muted">
              ${AUTH.esc(t.debut)} → ${AUTH.esc(t.fin)}<br/>
              ${t.prixUnite} TND / ${AUTH.esc(t.unite||'unité')}
              · Min ${t.minUnites||1} / Max ${t.maxUnites||1} unité(s)
            </small>
          </div>
          <div class="text-end">
            <small class="text-${dispo>0?'success':'danger'} fw-semibold d-block">${dispo} / ${t.placesTotal} disponible(s)</small>
            ${dispo>0 && canBookRental()
              ? `<button class="btn btn-attt btn-sm mt-1" data-perm="Réserver location vacances" data-perm-mode="action" onclick="openBook('${AUTH.esc(r.id)}','${AUTH.esc(t.id)}')">
                   <i class="bi bi-calendar-plus me-1"></i>Réserver
                 </button>`
              : dispo>0
              ? `<span class="badge bg-secondary mt-1">Réservation indisponible</span>`
              : `<span class="badge bg-danger mt-1">Complet</span>`}
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div class="col-md-6 col-lg-4">
      <div class="card rental-card h-100">
        ${r.photo ? `<img src="${r.photo}" class="card-img-top" style="height:160px;object-fit:cover;" alt="" />`
                  : `<div style="height:80px;background:var(--couleur-principale);opacity:.08;"></div>`}
        <div class="card-body">
          <h5 class="fw-bold mb-1">${AUTH.esc(r.titre)}</h5>
          ${r.adresse ? `<p class="text-muted small mb-2"><i class="bi bi-geo-alt me-1"></i>${AUTH.esc(r.adresse)}</p>` : ''}
          ${r.description ? `<p class="small text-secondary mb-3">${AUTH.esc(r.description)}</p>` : ''}
          ${r.mapUrl ? `<p class="mb-3"><a class="btn btn-sm btn-outline-primary" href="${AUTH.esc(r.mapUrl)}" target="_blank" rel="noopener"><i class="bi bi-geo-alt-fill me-1"></i>Voir l'emplacement Google Maps</a></p>` : ''}
          <hr class="my-2" />
          ${trancheCards}
        </div>
      </div>
    </div>`;
  }).join('');

  AUTH.applyPermissions(grid, user);
}

function openBook(rentalId, trancheId) {
  if (!canBookRental()) {
    alert("Vous n'avez pas le droit d'effectuer une réservation.");
    return;
  }
  const rental  = RENTALS.getRental(rentalId);
  const tranche = rental?.tranches?.find(t => t.id === trancheId);
  if (!rental || !tranche) return;
  _currentRental  = rental;
  _currentTranche = tranche;

  document.getElementById('bk-titre').textContent    = 'Réserver — ' + rental.titre;
  document.getElementById('bk-rental-id').value      = rentalId;
  document.getElementById('bk-tranche-id').value     = trancheId;
  document.getElementById('bk-tranche-desc').innerHTML = `
    <strong>${AUTH.esc(tranche.libelle)}</strong><br/>
    <small>${AUTH.esc(tranche.debut)} au ${AUTH.esc(tranche.fin)} — ${tranche.prixUnite} TND/${AUTH.esc(tranche.unite||'unité')}</small>`;
  document.getElementById('bk-nb-label').textContent = `Nombre d'unités (${tranche.minUnites||1} min — ${tranche.maxUnites||1} max)`;
  const nb = document.getElementById('bk-nb');
  nb.min   = tranche.minUnites || 1;
  nb.max   = tranche.maxUnites || 1;
  nb.value = tranche.minUnites || 1;
  const dispo = RENTALS.getAvailableUnits(rentalId, trancheId);
  document.getElementById('bk-dispo-text').textContent = `${dispo} unité(s) encore disponible(s).`;
  document.getElementById('bk-alert').classList.add('d-none');
  updateBookingTotal();
  new bootstrap.Modal(document.getElementById('bookModal')).show();
}

function updateBookingTotal() {
  if (!_currentTranche) return;
  const nb = parseInt(document.getElementById('bk-nb').value) || 1;
  document.getElementById('bk-total').textContent = (nb * _currentTranche.prixUnite) + ' TND';
}

function confirmBook() {
  if (!canBookRental()) {
    alert("Vous n'avez pas le droit d'effectuer une réservation.");
    return;
  }
  const alert   = document.getElementById('bk-alert');
  const show    = (t,m) => { alert.className='alert alert-'+t; alert.textContent=m; alert.classList.remove('d-none'); };
  const rentalId  = document.getElementById('bk-rental-id').value;
  const trancheId = document.getElementById('bk-tranche-id').value;
  const nb        = parseInt(document.getElementById('bk-nb').value) || 1;
  const result    = RENTALS.book(user.id, rentalId, trancheId, nb);
  if (result.ok) {
    bootstrap.Modal.getInstance(document.getElementById('bookModal')).hide();
    renderRentals();
    setTimeout(() => alert('✓ Réservation enregistrée ! Vous pouvez consulter votre réservation dans "Mon profil > Mes locations".'), 300);
  } else {
    show('danger', result.msg || 'Erreur lors de la réservation.');
  }
}
</script>
</body>
</html>
